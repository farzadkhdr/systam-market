  // ===== PERMISSION SYSTEM =====
  function hasPermission(moduleId) {
    const loggedUser = JSON.parse(localStorage.getItem('market_logged_user') || '{}');
    if (loggedUser.role === 'admin') return true;
    const perms = JSON.parse(sessionStorage.getItem('market_session_permissions') || '{}');
    return perms[moduleId] !== false;
  }

  function isAdmin() {
    const loggedUser = JSON.parse(localStorage.getItem('market_logged_user') || '{}');
    return loggedUser.role === 'admin';
  }

  function createParticles() {
    const container = document.getElementById('loginParticles');
    if (!container) return;
    for (let i = 0; i < 40; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.width = (Math.random() * 6 + 2) + 'px';
      particle.style.height = particle.style.width;
      particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
      particle.style.animationDelay = (Math.random() * 20) + 's';
      particle.style.background = `rgba(${99 + Math.random() * 50}, ${102 + Math.random() * 50}, ${241 + Math.random() * 50}, ${0.15 + Math.random() * 0.25})`;
      container.appendChild(particle);
    }
  }

  function showLogin() {
    const overlay = document.getElementById('loginOverlay');
    const system = document.getElementById('mainApp');
    if (overlay) overlay.classList.add('active');
    if (system) { system.classList.remove('visible'); system.classList.add('hidden'); }
    const dashboardStats = document.getElementById('dashboardStats');
    if (dashboardStats) dashboardStats.style.display = 'none';
  }

  function hideLogin() {
    const overlay = document.getElementById('loginOverlay');
    const system = document.getElementById('mainApp');
    if (overlay) overlay.classList.remove('active');
    if (system) { system.classList.remove('hidden'); system.classList.add('visible'); }
    isLoggedIn = true;
    const dashboardStats = document.getElementById('dashboardStats');
    if (dashboardStats) dashboardStats.style.display = 'grid';
  }

  window.handleLogin = function() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const btn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('loginError');
    errorDiv.classList.remove('show');
    if (!username || !password) {
      document.getElementById('loginErrorMessage').textContent = 'تکایە ناوی بەکارهێنەر و پاسوورد پڕبکەرەوە!';
      errorDiv.classList.add('show');
      return;
    }
    btn.classList.add('loading');
    setTimeout(() => {
      let isValid = false;
      let userRole = 'admin';
      let userName = 'بەڕێوەبەر';
      if (username === adminCredentials.username && password === adminCredentials.password) {
        isValid = true;
        userRole = 'admin';
        userName = 'بەڕێوەبەر';
      } else {
        const employee = employees.find(e => e.username === username && e.password === password);
        if (employee) {
          isValid = true;
          userRole = 'employee';
          userName = employee.name;
          const perms = employeePermissions[employee.id] || {};
          sessionStorage.setItem('market_session_permissions', JSON.stringify(perms));
          localStorage.setItem('market_logged_employee', JSON.stringify(employee));
        }
      }
      btn.classList.remove('loading');
      if (isValid) {
        localStorage.setItem('market_logged_user', JSON.stringify({ username, role: userRole, name: userName }));
        hideLogin();
        const roleDisplay = document.getElementById('userRoleDisplay');
        if (roleDisplay) roleDisplay.textContent = userRole === 'admin' ? '👑 بەڕێوەبەر' : `👤 ${userName}`;
        showToast(`👋 بەخێربێیت ${userName}!`, 'success');
        updateStats();
        renderDashboardModules();
      } else {
        document.getElementById('loginErrorMessage').textContent = 'ناوی بەکارهێنەر یان پاسوورد هەڵەیە! تکایە دووبارە هەوڵبدە.';
        errorDiv.classList.add('show');
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginPassword').focus();
      }
    }, 800);
  };

  function showToast(message, type = 'info') {
    const existing = document.querySelector('.custom-toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'custom-toast';
    toast.style.cssText = `
      position: fixed; bottom: 30px; right: 30px;
      background: ${type === 'success' ? 'rgba(16, 185, 129, 0.95)' : 'rgba(99, 102, 241, 0.95)'};
      color: white; padding: 1rem 2rem; border-radius: 1.5rem;
      font-weight: 600; font-size: 1rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3); z-index: 10000;
      backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15);
      max-width: 90%;
    `;
    toast.textContent = message;
    document.body.appendChild(toast);
    requestAnimationFrame(() => {
      toast.style.transform = 'translateY(0)';
      toast.style.opacity = '1';
      toast.style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
    });
    setTimeout(() => {
      toast.style.transform = 'translateY(20px)';
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 500);
    }, 3500);
  }

  // ===== ACCOUNTING / TRANSFER FUNCTION =====
  function updateAccountingDisplay() {
    const today = new Date().toLocaleDateString('ckb');
    // Today money (only regular, not transfers)
    const todayMoney = moneyRequests
      .filter(r => r.date && r.date.includes(today) && r.isTransfer !== true && r.amount > 0)
      .reduce((sum, r) => sum + r.amount, 0);
    // Total money (only transfers)
    const totalMoney = moneyRequests
      .filter(r => r.isTransfer === true)
      .reduce((sum, r) => sum + r.amount, 0);
    const accToday = document.getElementById('accTodayMoney');
    const accTotal = document.getElementById('accTotalMoney');
    if (accToday) accToday.textContent = todayMoney.toLocaleString();
    if (accTotal) accTotal.textContent = totalMoney.toLocaleString();
    const statTotalMoneyReceived = document.getElementById('statTotalMoneyReceived');
    if (statTotalMoneyReceived) statTotalMoneyReceived.textContent = totalMoney.toLocaleString();
  }

  window.transferMoney = function() {
    const amountInput = document.getElementById('transferAmount');
    const amount = parseInt(amountInput.value);
    if (!amount || amount <= 0) {
      alert('تکایە بڕی پارەی دروست بنووسە (ژمارەیەک لە 1 زیاتر)');
      return;
    }
    const today = new Date().toLocaleDateString('ckb');
    const todayMoney = moneyRequests
      .filter(r => r.date && r.date.includes(today) && r.isTransfer !== true && r.amount > 0)
      .reduce((sum, r) => sum + r.amount, 0);
    if (amount > todayMoney) {
      alert(`بڕی ${amount.toLocaleString()} د.ع لە واسڵی ئەمرۆ (${todayMoney.toLocaleString()} د.ع) زیاترە!`);
      return;
    }
    if (confirm(`دڵنیایت کە ${amount.toLocaleString()} د.ع لە واسڵی ئەمرۆ بگوازیتەوە بۆ کۆی واسڵکراو؟`)) {
      const now = new Date();
      const dateStr = now.toLocaleString('ckb', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
      
      moneyRequests.push({
        id: 'TR' + Math.floor(Math.random() * 9000 + 1000),
        date: dateStr,
        type: 'transfer',
        entityName: 'گواستنەوەی پارە',
        entityPhone: '-',
        amount: amount,
        note: `گواستنەوە لە واسڵی ئەمرۆ بۆ کۆی گشتی`,
        isTransfer: true
      });
      
      moneyRequests.push({
        id: 'TR-OUT' + Date.now(),
        date: dateStr,
        type: 'transfer_out',
        entityName: 'کەمکردنەوەی واسڵی ئەمرۆ',
        entityPhone: '-',
        amount: -amount,
        note: `گواستنەوە بۆ کۆی گشتی`,
        isTransfer: false,
        isExpense: true
      });
      
      localStorage.setItem('market_money_requests', JSON.stringify(moneyRequests));
      updateAccountingDisplay();
      updateStats();
      amountInput.value = '';
      showToast(`✅ ${amount.toLocaleString()} د.ع بە سەرکەوتوویی گواسترایەوە بۆ کۆی واسڵکراو!`, 'success');
      renderMoneyHistory();
    }
  };

  window.changeAdminPassword = function() {
    const currentPass = document.getElementById('adminCurrentPassword').value.trim();
    const newPass = document.getElementById('adminNewPassword').value.trim();
    const confirmPass = document.getElementById('adminConfirmPassword').value.trim();
    if (!currentPass || !newPass || !confirmPass) { alert('تکایە هەموو خانەکان پڕبکەرەوە'); return; }
    if (currentPass !== adminCredentials.password) { alert('پاسووردی کۆن هەڵەیە!'); return; }
    if (newPass.length < 6) { alert('پاسووردی نوێ دەبێت لە 6 پیت زیاتر بێت'); return; }
    if (newPass !== confirmPass) { alert('پاسووردی نوێ و پشتڕاستکردنەوە یەکسان نین'); return; }
    adminCredentials.password = newPass;
    localStorage.setItem('market_admin_credentials', JSON.stringify(adminCredentials));
    document.getElementById('adminCurrentPassword').value = '';
    document.getElementById('adminNewPassword').value = '';
    document.getElementById('adminConfirmPassword').value = '';
    updateAdminDisplay();
    alert('پاسووردی بەڕێوەبەر بە سەرکەوتوویی گۆڕدرا!');
  };

  window.searchSecurityEmployee = function() {
    const query = document.getElementById('securityEmployeeSearch').value.trim().toLowerCase();
    const suggestions = document.getElementById('securityEmployeeSuggestions');
    if (!query) { suggestions.style.display = 'none'; return; }
    const filtered = employees.filter(e => e.name.toLowerCase().includes(query));
    if (filtered.length) {
      suggestions.innerHTML = filtered.map(e => `

  // ===== UPDATE STATS (FIXED) =====
  function updateStats() {
    const totalSales = saleHistory.reduce((sum, s) => sum + s.total, 0);
    const totalPurchases = purchaseHistory.reduce((sum, p) => sum + p.total, 0);
    
    // Total money received (ONLY from transfers)
    const totalMoneyReceived = moneyRequests
      .filter(r => r.isTransfer === true)
      .reduce((sum, r) => sum + r.amount, 0);
    
    const totalExpenses = expenseHistory.reduce((sum, e) => sum + e.amount, 0);
    const totalGiveMoney = giveMoneyHistory.reduce((sum, g) => sum + g.amount, 0);
    const totalSpend = purchaseHistory.filter(p => p.isCash).reduce((sum, p) => sum + p.total, 0) +
                       employees.reduce((sum, e) => sum + (e.salaryHistory || []).reduce((s, sh) => s + sh.amount, 0), 0) +
                       returnHistory.reduce((sum, r) => sum + r.refundAmount, 0);
    const totalSpendAndExpenses = totalSpend + totalExpenses + totalGiveMoney;
    
    // Today money (only regular, not transfers)
    const today = new Date().toLocaleDateString('ckb');
    
    // FIX: Include ALL money requests that are NOT transfers and have positive amount
    const todayMoneyFromRequests = moneyRequests
      .filter(r => r.date && r.date.includes(today) && r.isTransfer !== true && r.amount > 0)
      .reduce((sum, r) => sum + r.amount, 0);
    
    // Also include cash returns from purchase returns
    const todayPurchaseReturns = purchaseReturnHistory
      .filter(r => r.date && r.date.includes(today) && r.type === 'cash')
      .reduce((sum, r) => sum + r.refundAmount, 0);
    
    // Also include agent sales (cash) - from saleHistory with agent field
    const todayAgentSales = saleHistory
      .filter(s => s.date && s.date.includes(today) && s.agent)
      .reduce((sum, s) => sum + s.total, 0);
    
    const todayMoneyReceived = todayMoneyFromRequests + todayPurchaseReturns + todayAgentSales;
    
    const totalProducts = warehouseProducts.length;
    const totalPersons = customers.length;
    const myDebtToPartners = partners.reduce((sum, p) => sum + (p.debt || 0), 0);
    const personsDebtToMe = customers.reduce((sum, c) => sum + (c.debt || 0), 0);

    const statTotalSalesEl = document.getElementById('statTotalSales');
    const statTotalPurchasesEl = document.getElementById('statTotalPurchases');
    const statTotalMoneyReceivedEl = document.getElementById('statTotalMoneyReceived');
    const statTotalSpendAndExpensesEl = document.getElementById('statTotalSpendAndExpenses');
    const statTodayMoneyReceivedEl = document.getElementById('statTodayMoneyReceived');
    const statTotalProductsEl = document.getElementById('statTotalProducts');
    const statTotalPersonsEl = document.getElementById('statTotalPersons');
    const statMyDebtToPartnersEl = document.getElementById('statMyDebtToPartners');
    const statPersonsDebtToMeEl = document.getElementById('statPersonsDebtToMe');

    if (statTotalSalesEl) statTotalSalesEl.textContent = totalSales.toLocaleString();
    if (statTotalPurchasesEl) statTotalPurchasesEl.textContent = totalPurchases.toLocaleString();
    if (statTotalMoneyReceivedEl) statTotalMoneyReceivedEl.textContent = totalMoneyReceived.toLocaleString();
    if (statTotalSpendAndExpensesEl) statTotalSpendAndExpensesEl.textContent = totalSpendAndExpenses.toLocaleString();
    if (statTodayMoneyReceivedEl) statTodayMoneyReceivedEl.textContent = todayMoneyReceived.toLocaleString();
    if (statTotalProductsEl) statTotalProductsEl.textContent = totalProducts;
    if (statTotalPersonsEl) statTotalPersonsEl.textContent = totalPersons;
    if (statMyDebtToPartnersEl) statMyDebtToPartnersEl.textContent = myDebtToPartners.toLocaleString();
    if (statPersonsDebtToMeEl) statPersonsDebtToMeEl.textContent = personsDebtToMe.toLocaleString();

    updateAccountingDisplay();
  }

  // ===== EXPENSE FUNCTIONS =====
  function updateExpenseStats() {
    const today = new Date().toLocaleDateString('ckb');
    const todayMoney = moneyRequests
      .filter(r => r.date && r.date.includes(today) && r.isTransfer !== true && r.amount > 0)
      .reduce((sum, r) => sum + r.amount, 0);
    const todayExpense = expenseHistory.filter(e => e.date && e.date.includes(today)).reduce((sum, e) => sum + e.amount, 0);
    const remaining = todayMoney - todayExpense;
    const displayEl = document.getElementById('todayMoneyDisplay');
    const expenseEl = document.getElementById('todayExpenseDisplay');
    const remainingEl = document.getElementById('todayRemainingDisplay');
    if (displayEl) displayEl.textContent = todayMoney.toLocaleString();
    if (expenseEl) expenseEl.textContent = todayExpense.toLocaleString();
    if (remainingEl) remainingEl.textContent = Math.max(0, remaining).toLocaleString();
  }

  function updateGiveStats() {
    const today = new Date().toLocaleDateString('ckb');
    const todayMoney = moneyRequests
      .filter(r => r.date && r.date.includes(today) && r.isTransfer !== true && r.amount > 0)
      .reduce((sum, r) => sum + r.amount, 0);
    const todayGive = giveMoneyHistory.filter(g => g.date && g.date.includes(today)).reduce((sum, g) => sum + g.amount, 0);
    const displayEl = document.getElementById('todayMoneyGiveDisplay');
    const giveEl = document.getElementById('todayGiveDisplay');
    if (displayEl) displayEl.textContent = todayMoney.toLocaleString();
    if (giveEl) giveEl.textContent = todayGive.toLocaleString();
  }

  window.submitExpense = function() {
    const amount = parseInt(document.getElementById('expenseAmount').value);
    const category = document.getElementById('expenseCategory').value;
    const note = document.getElementById('expenseNote').value.trim();
    const dateTime = document.getElementById('expenseDateTime').value;
    if (!amount || amount <= 0) { alert('تکایە بڕی پارەی دروست بنووسە'); return; }
    const today = new Date().toLocaleDateString('ckb');
    const todayMoney = moneyRequests
      .filter(r => r.date && r.date.includes(today) && r.isTransfer !== true && r.amount > 0)
      .reduce((sum, r) => sum + r.amount, 0);
    const todayExpense = expenseHistory.filter(e => e.date && e.date.includes(today)).reduce((sum, e) => sum + e.amount, 0);
    if (todayExpense + amount > todayMoney) {
      if (!confirm(`ئاگاداری! واسڵی ئەمرۆ ${todayMoney.toLocaleString()} د.عە و مەسروفاتەکە ${(todayExpense + amount).toLocaleString()} د.ع دەبێت. دەتەوێت بەردەوام بیت؟`)) return;
    }
    const now = new Date();
    const dateStr = dateTime ? new Date(dateTime).toLocaleString('ckb', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : now.toLocaleString('ckb');
    expenseHistory.unshift({ id: 'EXP' + Math.floor(Math.random() * 9000 + 1000), date: dateStr, amount: amount, category: category, note: note || category, timestamp: dateTime || now.toISOString() });
    
    moneyRequests.push({
      id: 'EXP-MONEY' + Date.now(),
      date: dateStr,
      type: 'expense',
      entityName: category,
      entityPhone: '-',
      amount: -amount,
      note: note || category,
      isTransfer: false,
      isExpense: true
    });
    
    saveExpenseHistory();
    saveMoneyRequests();
    document.getElementById('expenseAmount').value = '';
    document.getElementById('expenseNote').value = '';
    document.getElementById('expenseDateTime').value = '';
    renderExpenseHistory();
    updateExpenseStats();
    updateStats();
    alert(`مەسروفات بە سەرکەوتوویی تۆمارکرا!\nبڕ: ${amount.toLocaleString()} د.ع\nهۆکار: ${category}`);
  };

    const record = expenseHistory.find(e => e.id === id);

  window.submitMoneyGive = function() {
    if (!selectedGiveEntity) { alert('تکایە کەس یان شەریک هەڵبژێرە'); return; }
    const amount = parseInt(document.getElementById('moneyGiveAmount').value);
    if (!amount || amount <= 0) { alert('تکایە بڕی پارەی دروست بنووسە'); return; }
    const note = document.getElementById('moneyGiveNote').value.trim() || 'پارە پێدان';
    const dateTime = document.getElementById('moneyGiveDateTime').value;
    const now = new Date();
    const dateStr = dateTime ? new Date(dateTime).toLocaleString('ckb', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : now.toLocaleString('ckb');
    const today = new Date().toLocaleDateString('ckb');
    const todayMoney = moneyRequests
      .filter(r => r.date && r.date.includes(today) && r.isTransfer !== true && r.amount > 0)
      .reduce((sum, r) => sum + r.amount, 0);
    const todayGive = giveMoneyHistory.filter(g => g.date && g.date.includes(today)).reduce((sum, g) => sum + g.amount, 0);
    if (todayGive + amount > todayMoney) {
      if (!confirm(`ئاگاداری! واسڵی ئەمرۆ ${todayMoney.toLocaleString()} د.عە و پێدانی پارە ${(todayGive + amount).toLocaleString()} د.ع دەبێت. دەتەوێت بەردەوام بیت؟`)) return;

    const invId = 'GIVE' + Math.floor(Math.random() * 9000 + 1000);
    if (selectedGiveEntity.type === 'person') {
      const person = customers.find(c => c.id === selectedGiveEntity.id);
      if (person) {
        person.debt = (person.debt || 0) + amount;
        if (!person.movements) person.movements = [];
        person.movements.push({ type: 'give_money', date: dateStr, amount: amount, note: note, invoiceId: invId });
        saveCustomers();
      }
    } else {
      const partner = partners.find(p => p.id === selectedGiveEntity.id);
      if (partner) {
        partner.debt = (partner.debt || 0) + amount;
        if (!partner.movements) partner.movements = [];
        partner.movements.push({ type: 'give_money', date: dateStr, amount: amount, note: note, invoiceId: invId });
        savePartners();
      }
    }
    giveMoneyHistory.unshift({ id: invId, date: dateStr, type: selectedGiveEntity.type, entityId: selectedGiveEntity.id, entityName: selectedGiveEntity.name, entityPhone: selectedGiveEntity.phone, amount: amount, note: note, timestamp: dateTime || now.toISOString() });
    
    moneyRequests.push({

      type: 'give_money',
      entityName: selectedGiveEntity.name,
      entityPhone: selectedGiveEntity.phone,
      amount: -amount,
      note: note,
      isTransfer: false,
      isExpense: true

    updateStats();

    renderPartnersList();

  function attachDragEvents(container) {
    const cards = container.querySelectorAll('.module-card[draggable]');
    cards.forEach(card => {
      card.addEventListener('dragstart', handleDragStart);
      card.addEventListener('dragend', handleDragEnd);
      card.addEventListener('dragover', (e) => e.preventDefault());
      card.addEventListener('drop', handleDrop);
    });
  }

  let draggedItem = null;

  function handleDragStart(e) {
    draggedItem = this;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', this.dataset.moduleId);
  }

  function handleDragEnd(e) {
    this.classList.remove('dragging');
    draggedItem = null;
    document.querySelectorAll('.module-card').forEach(c => c.classList.remove('drag-over'));
  }

  function handleDrop(e) {
    e.preventDefault();
    if (!draggedItem || draggedItem === this) return;
    const container = this.parentNode;
    const allCards = Array.from(container.querySelectorAll('.module-card'));
    const fromIndex = allCards.indexOf(draggedItem);
    const toIndex = allCards.indexOf(this);
    if (fromIndex < 0 || toIndex < 0) return;
    if (fromIndex < toIndex) container.insertBefore(draggedItem, this.nextSibling);
    else container.insertBefore(draggedItem, this);
    updateModuleOrderFromDOM(container);
    renderDashboardModules();
    renderSettingsLayoutModules();
  }

  function updateModuleOrderFromDOM(container) {
    const cards = container.querySelectorAll('.module-card');

    if (newOrder.length === allModules.length) {

    }
  }

  window.submitMoneyRequest = function() {
    if (!selectedMoneyEntity) { alert('تکایە کەس یان شەریک هەڵبژێرە'); return; }
    const amount = parseInt(document.getElementById('moneyAmount').value);
    if (!amount || amount <= 0) { alert('تکایە بڕی پارە بنووسە'); return; }
    const note = document.getElementById('moneyNote').value.trim();
    const now = new Date();
    const dateStr = now.toLocaleString('ckb', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const invId = 'W' + Math.floor(Math.random() * 9000 + 1000);
    const record = { id: invId, date: dateStr, type: selectedMoneyEntity.type, entityId: selectedMoneyEntity.id, entityName: selectedMoneyEntity.name, entityPhone: selectedMoneyEntity.phone, amount: amount, note: note, previousDebt: selectedMoneyEntity.debt || 0, isTransfer: false };
    if (selectedMoneyEntity.type === 'person') {
      const person = customers.find(c => c.id === selectedMoneyEntity.id);
      if (person) { person.debt = Math.max(0, (person.debt || 0) - amount); if (!person.movements) person.movements = []; person.movements.push({ type: 'received', date: dateStr, amount: amount, note: note, invoiceId: invId }); saveCustomers(); }
    } else {
      const partner = partners.find(p => p.id === selectedMoneyEntity.id);
      if (partner) { partner.debt = Math.max(0, (partner.debt || 0) - amount); if (!partner.movements) partner.movements = []; partner.movements.push({ type: 'received', date: dateStr, amount: amount, note: note, invoiceId: invId }); savePartners(); }
    }
    moneyRequests.unshift(record);
    saveMoneyRequests();
    selectedMoneyEntity = null;
    document.getElementById('moneyAmount').value = '';
    document.getElementById('moneyNote').value = '';
    document.getElementById('moneyEntitySearch').value = '';

    renderMoneyHistory();
    renderPersonsList();

  window.editMoneyInvoice = function(invId) {
    const record = moneyRequests.find(r => r.id === invId);
    if (!record) return;
    const newAmount = prompt('بڕی نوێی پارە:', record.amount);
    if (newAmount === null) return;
    const newNote = prompt('تێبینی نوێ:', record.note || '');
    if (newNote === null) return;
    const amountDiff = parseInt(newAmount) - record.amount;
    if (record.type === 'person') {
      const person = customers.find(c => c.id === record.entityId);
      if (person) { person.debt = Math.max(0, (person.debt || 0) - amountDiff); const mov = person.movements?.find(m => m.invoiceId === invId); if (mov) { mov.amount = parseInt(newAmount); mov.note = newNote; } saveCustomers(); }
    } else if (record.type === 'partner') {
      const partner = partners.find(p => p.id === record.entityId);
      if (partner) { partner.debt = Math.max(0, (partner.debt || 0) - amountDiff); const mov = partner.movements?.find(m => m.invoiceId === invId); if (mov) { mov.amount = parseInt(newAmount); mov.note = newNote; } savePartners(); }
    } else if (record.type === 'agent') {
      const agent = agents.find(a => a.id === record.entityId);
      if (agent) { agent.debt = Math.max(0, (agent.debt || 0) - amountDiff); saveAgents(); }
    }
    record.amount = parseInt(newAmount);
    record.note = newNote;
    saveMoneyRequests();
    renderMoneyHistory();
    document.getElementById('moneyInvoiceDetail').style.display = 'none';
    alert('واسڵ نوێکرایەوە');

    if (record.type === 'person') {
      const person = customers.find(c => c.id === record.entityId);
      if (person) { person.debt = (person.debt || 0) + record.amount; person.movements = person.movements?.filter(m => m.invoiceId !== invId) || []; saveCustomers(); }
    } else if (record.type === 'partner') {
      const partner = partners.find(p => p.id === record.entityId);
      if (partner) { partner.debt = (partner.debt || 0) + record.amount; partner.movements = partner.movements?.filter(m => m.invoiceId !== invId) || []; savePartners(); }
    } else if (record.type === 'agent') {
      const agent = agents.find(a => a.id === record.entityId);
      if (agent) { agent.debt = (agent.debt || 0) + record.amount; saveAgents(); }
    }
    moneyRequests = moneyRequests.filter(r => r.id !== invId);
    saveMoneyRequests();
    renderMoneyHistory();

    renderPartnersList();

    const query = document.getElementById('warePurchaseSearch')?.value.trim().toLowerCase() || '';

    if (!query) { suggestions.style.display = 'none'; return; }
    const filtered = warehouseProducts.filter(p => p.name.toLowerCase().includes(query) || p.barcode.includes(query));
    if (filtered.length) {
      suggestions.innerHTML = filtered.map(p => `<div class="suggestion-item" data-pid="${p.id}"><span>📦</span><span><strong>${p.name}</strong> - ${p.buyPrice} د.ع</span><span style="margin-right:auto;">بارکۆد: ${p.barcode}</span></div>`).join('');
      suggestions.style.display = 'block';
      suggestions.querySelectorAll('.suggestion-item').forEach(item => {
        item.addEventListener('click', function() {
          const prod = warehouseProducts.find(p => p.id === parseInt(this.dataset.pid));
          if (prod) addToWarePurchaseCart(prod);
          suggestions.style.display = 'none';
          document.getElementById('warePurchaseSearch').value = '';
        });
      });
    } else { suggestions.style.display = 'none'; }
  };

  function addToWarePurchaseCart(product) {
    const existing = warePurchaseCart.find(i => i.product.id === product.id);
    if (existing) existing.quantity++;

  // ===== FIXED COMPLETE SALE FUNCTION =====
  window.completeSale = function() {
    if (!cart.length) { alert('هیچ کاڵایەک نییە'); return; }
    const total = cart.reduce((s, i) => s + (i.unitPrice * i.quantity), 0);
    const invId = 'F' + (Math.floor(Math.random() * 9000) + 1000);
    const custName = (currentCustomer && creditCheck.checked) ? currentCustomer.name : 'کاش';
    const now = new Date();
    const dateStr = now.toLocaleString('ckb', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    
    saleHistory.unshift({ id: invId, date: dateStr, customer: custName, total, items: cart.map(i => ({ name: i.product.name, qty: i.quantity, price: i.unitPrice })) });
    
    if (currentCustomer && creditCheck.checked) { 
      currentCustomer.debt = (currentCustomer.debt || 0) + total; 
      saveCustomers(); 
    }
    
    cart.forEach(item => { 
      const product = warehouseProducts.find(p => p.id === item.product.id); 
      if (product) product.quantity = Math.max(0, product.quantity - item.quantity); 
    });
    saveWarehouseProducts();
    saveSaleHistory();
    
    // === FIX: ADD MONEY TO TODAY'S MONEY ===
    // Only if NOT credit sale
    if (!creditCheck.checked) {
      moneyRequests.push({
        id: 'SALE-MONEY' + Date.now(),
        date: dateStr,
        type: 'sale',
        entityName: custName,
        entityPhone: '-',
        amount: total,
        note: `فرۆشتن ${invId}`,
        isTransfer: false
      });
      saveMoneyRequests();
    }
    
    cart = [];
    currentCustomer = null;
    creditCheck.checked = false;
    creditSection.style.display = 'none';
    updateSelectedCustomerBadge();
    customerSearch.value = '';
    renderCart();
    updateInvoicePreview();
    
    // === FIX: Force update all stats ===
    updateStats();
    updateAccountingDisplay();
    updateExpenseStats();
    updateGiveStats();
    
    alert('فرۆشتن تۆمارکرا!');
  };

            selectedPurchaseReturnProduct = null;

            document.getElementById('purchaseReturnMaxQty').value = '';

  window.submitPurchaseReturn = function() {
    if (!selectedPurchaseReturn) { alert('تکایە فاکتوورێک هەڵبژێرە'); return; }
    if (!selectedPurchaseReturnProduct) { alert('تکایە کاڵایەک هەڵبژێرە بۆ گەڕانەوە'); return; }
    const returnQty = parseInt(document.getElementById('purchaseReturnQuantity').value);
    if (isNaN(returnQty) || returnQty < 1 || returnQty > selectedPurchaseReturnProduct.qty) { alert('بڕی گەڕانەوە نادروستە'); return; }
    const returnType = document.getElementById('purchaseReturnType').value;
    if (returnType === 'debt' && !selectedPurchaseReturnPartnerForDebt) { alert('تکایە شەریکێک هەڵبژێرە بۆ کەمکردنەوەی قەرز'); return; }
    const refundAmount = returnQty * selectedPurchaseReturnProduct.price;
    const product = warehouseProducts.find(p => p.name === selectedPurchaseReturnProduct.name);
    if (product) { product.quantity = Math.max(0, product.quantity - returnQty); saveWarehouseProducts(); }
    const originalPurchase = purchaseHistory.find(p => p.id === selectedPurchaseReturn.id);
    if (originalPurchase) {
      const purchaseItem = originalPurchase.items[selectedPurchaseReturnProduct.originalIndex];
      if (purchaseItem) { purchaseItem.qty -= returnQty; if (purchaseItem.qty === 0) originalPurchase.items.splice(selectedPurchaseReturnProduct.originalIndex, 1); originalPurchase.total = originalPurchase.items.reduce((sum, i) => sum + (i.qty * i.price), 0); savePurchaseHistory(); }
    }
    if (returnType === 'cash') {
      moneyRequests.push({
        id: 'PR' + Date.now(),
        date: new Date().toLocaleString('ckb'),
        type: 'purchase_return',
        entityName: 'گەڕانەوەی کڕین',
        amount: refundAmount,
        note: `گەڕانەوەی کاڵا لە فاکتوورە ${selectedPurchaseReturn.id}`,
        isTransfer: false
      });
      saveMoneyRequests();
    } else if (returnType === 'debt' && selectedPurchaseReturnPartnerForDebt) {
      selectedPurchaseReturnPartnerForDebt.debt = Math.max(0, (selectedPurchaseReturnPartnerForDebt.debt || 0) - refundAmount);
      if (!selectedPurchaseReturnPartnerForDebt.movements) selectedPurchaseReturnPartnerForDebt.movements = [];
      selectedPurchaseReturnPartnerForDebt.movements.push({ type: 'purchase_return', date: new Date().toLocaleString('ckb'), amount: refundAmount, note: `گەڕانەوەی کاڵا لە فاکتوورە ${selectedPurchaseReturn.id}`, invoiceId: 'PR' + Date.now() });
      savePartners();
    }
    purchaseReturnHistory.unshift({ id: 'PR' + Date.now(), date: new Date().toLocaleString('ckb'), originalInvoiceId: selectedPurchaseReturn.id, partner: returnType === 'debt' ? selectedPurchaseReturnPartnerForDebt.name : selectedPurchaseReturn.partner, productName: selectedPurchaseReturnProduct.name, quantity: returnQty, price: selectedPurchaseReturnProduct.price, refundAmount: refundAmount, type: returnType, note: returnType === 'debt' ? 'کەمکرایەوە لە قەرزی شەریک' : 'وەرگرتنەوەی پارە (نەقدی)' });
    savePurchaseReturnHistory();
    alert(`گەڕانەوەی کڕین بە سەرکەوتوویی تۆمارکرا!\nکاڵا: ${selectedPurchaseReturnProduct.name}\nبڕ: ${returnQty}\nبەهای گەڕاوە: ${refundAmount.toLocaleString()} د.ع`);
    selectedPurchaseReturn = null; selectedPurchaseReturnProduct = null; selectedPurchaseReturnPartnerForDebt = null;
    document.getElementById('selectedPurchaseForReturn').style.display = 'none';
    document.getElementById('purchaseReturnProductSelection').style.display = 'none';
    document.getElementById('purchaseReturnSearch').value = '';
    document.getElementById('purchaseReturnPartnerSearch').value = '';
    document.getElementById('selectedPurchaseReturnPartnerBadge').innerHTML = '';
    document.getElementById('purchaseReturnType').value = 'cash';
    document.getElementById('purchaseReturnPartnerSearchDiv').style.display = 'none';
    document.getElementById('purchaseReturnSuggestions').style.display = 'none';
    updateStats();
    renderProductsGrid();
    renderPurchaseHistory();
  };

    if (!container) return;
    if (!purchaseReturnHistory.length) { container.innerHTML = '<p style="color:#94a3b8; text-align:center;">هیچ گەڕانەوەیەکی کڕین تۆمار نەکراوە</p>'; return; }

  window.deletePurchaseReturn = function(returnId) {
    if (confirm('دڵنیایت لە سڕینەوەی ئەم تۆمارە؟')) {
      const record = purchaseReturnHistory.find(r => r.id === returnId);
      if (record) { const product = warehouseProducts.find(p => p.name === record.productName); if (product) { product.quantity += record.quantity; saveWarehouseProducts(); }
        if (record.type === 'cash') { const moneyRecord = moneyRequests.find(m => m.note && m.note.includes(record.originalInvoiceId) && m.amount > 0); if (moneyRecord) { moneyRequests = moneyRequests.filter(m => m.id !== moneyRecord.id); saveMoneyRequests(); } }
        else if (record.type === 'debt') { const partner = partners.find(p => p.name === record.partner); if (partner) { partner.debt = (partner.debt || 0) + record.refundAmount; savePartners(); } }
        const purchase = purchaseHistory.find(p => p.id === record.originalInvoiceId); if (purchase) { const existingItem = purchase.items.find(i => i.name === record.productName); if (existingItem) existingItem.qty += record.quantity; else purchase.items.push({ name: record.productName, qty: record.quantity, price: record.price }); purchase.total = purchase.items.reduce((sum, i) => sum + (i.qty * i.price), 0); savePurchaseHistory(); }
      }
      purchaseReturnHistory = purchaseReturnHistory.filter(r => r.id !== returnId);
      savePurchaseReturnHistory();
      renderPurchaseReturnHistory();
      updateStats();
    }
  };

  window.submitSalesReturn = function() {
    if (!selectedReturnSale) { alert('تکایە فاکتوورێک هەڵبژێرە'); return; }
    if (!selectedReturnProduct) { alert('تکایە کاڵایەک هەڵبژێرە بۆ گەڕانەوە'); return; }
    const returnQty = parseInt(document.getElementById('returnQuantity').value);
    if (isNaN(returnQty) || returnQty < 1 || returnQty > selectedReturnProduct.qty) { alert('بڕی گەڕانەوە نادروستە'); return; }
    const returnType = document.getElementById('returnType').value;
    if (returnType === 'debt' && !selectedReturnCustomerForDebt) { alert('تکایە کەسێک هەڵبژێرە بۆ کەمکردنەوەی قەرز'); return; }
    const refundAmount = returnQty * selectedReturnProduct.price;
    const product = warehouseProducts.find(p => p.name === selectedReturnProduct.name);
    if (product) { product.quantity += returnQty; saveWarehouseProducts(); } else { const newId = warehouseProducts.length ? Math.max(...warehouseProducts.map(p => p.id)) + 1 : 1; warehouseProducts.push({ id: newId, name: selectedReturnProduct.name, barcode: '', image: '', quantity: returnQty, unit: 'عدد', secondQty: 0, buyPrice: selectedReturnProduct.price, sellPrice: selectedReturnProduct.price, expiryDate: '' }); saveWarehouseProducts(); }
    const originalSale = saleHistory.find(s => s.id === selectedReturnSale.id);
    if (originalSale) {
      const saleItem = originalSale.items[selectedReturnProduct.originalIndex];
      if (saleItem) { saleItem.qty -= returnQty; if (saleItem.qty === 0) originalSale.items.splice(selectedReturnProduct.originalIndex, 1); originalSale.total = originalSale.items.reduce((sum, i) => sum + (i.qty * i.price), 0); saveSaleHistory(); }
    }
    if (returnType === 'debt' && selectedReturnCustomerForDebt) {
      selectedReturnCustomerForDebt.debt = Math.max(0, (selectedReturnCustomerForDebt.debt || 0) - refundAmount);
      if (!selectedReturnCustomerForDebt.movements) selectedReturnCustomerForDebt.movements = [];
      selectedReturnCustomerForDebt.movements.push({ type: 'sales_return', date: new Date().toLocaleString('ckb'), amount: refundAmount, note: `گەڕانەوەی کاڵا لە فاکتوورە ${selectedReturnSale.id}`, invoiceId: 'RET' + Date.now() });
      saveCustomers();
    } else if (returnType === 'cash') {
      moneyRequests.push({
        id: 'RET-MONEY' + Date.now(),
        date: new Date().toLocaleString('ckb'),
        type: 'sales_return',
        entityName: selectedReturnSale.customer,
        amount: -refundAmount,
        note: `گەڕانەوەی کاڵا لە فاکتوورە ${selectedReturnSale.id}`,
        isTransfer: false,
        isExpense: true
      });
      saveMoneyRequests();
    }
    returnHistory.unshift({ id: 'RET' + Date.now(), date: new Date().toLocaleString('ckb'), originalInvoiceId: selectedReturnSale.id, customer: returnType === 'debt' ? selectedReturnCustomerForDebt.name : selectedReturnSale.customer, productName: selectedReturnProduct.name, quantity: returnQty, price: selectedReturnProduct.price, refundAmount: refundAmount, type: returnType, note: returnType === 'debt' ? 'کەمکرایەوە لە قەرز' : 'گەڕانەوەی پارە (نەقدی)' });
    saveReturnHistory();
    alert(`گەڕانەوە بە سەرکەوتوویی تۆمارکرا!\nکاڵا: ${selectedReturnProduct.name}\nبڕ: ${returnQty}\nبەهای گەڕاوە: ${refundAmount.toLocaleString()} د.ع`);
    selectedReturnSale = null; selectedReturnProduct = null; selectedReturnCustomerForDebt = null;
    document.getElementById('selectedSaleForReturn').style.display = 'none';
    document.getElementById('returnProductSelection').style.display = 'none';
    document.getElementById('returnInvoiceSearch').value = '';
    document.getElementById('returnCustomerSearch').value = '';
    document.getElementById('selectedReturnCustomerBadge').innerHTML = '';
    document.getElementById('returnType').value = 'cash';
    document.getElementById('returnCustomerSearchDiv').style.display = 'none';
    document.getElementById('returnInvoiceSuggestions').style.display = 'none';
    updateStats();
    renderProductsGrid();
    renderHistory();
  };

  function renderReturnHistory() {
    const container = document.getElementById('returnHistoryContainer');
    if (!container) return;
    if (!returnHistory.length) { container.innerHTML = '<p style="color:#94a3b8; text-align:center;">هیچ گەڕانەوەیەکی فرۆشتن تۆمار نەکراوە</p>'; return; }
    container.innerHTML = returnHistory.map(r => `
      <div class="history-row">
        <div><strong>${r.id}</strong><br><span style="font-size:0.7rem;">${r.date}</span></div>
        <div>📄 ${r.originalInvoiceId}<br>👤 ${r.customer}</div>
        <div>📦 ${r.productName}<br>✕ ${r.quantity}</div>
        <div>💰 ${r.refundAmount.toLocaleString()} د.ع</div>
        <div><span style="font-size:0.7rem; background:${r.type === 'debt' ? '#dbeafe' : '#fef3c7'}; padding:0.2rem 0.5rem; border-radius:1rem;">${r.type === 'debt' ? 'کەمکردنەوەی قەرز' : 'گەڕانەوەی پارە'}</span></div>
        <div><button class="btn-icon" onclick="deleteSalesReturn('${r.id}')"><i class="fas fa-trash-alt" style="color:#b91c1c;"></i></button></div>
      </div>`).join('');
  }

  window.deleteSalesReturn = function(returnId) {
    if (confirm('دڵنیایت لە سڕینەوەی ئەم تۆمارە؟')) {
      const record = returnHistory.find(r => r.id === returnId);
      if (record) {
        const product = warehouseProducts.find(p => p.name === record.productName);
        if (product) { product.quantity = Math.max(0, product.quantity - record.quantity); saveWarehouseProducts(); }
        if (record.type === 'debt') { const customer = customers.find(c => c.name === record.customer); if (customer) { customer.debt = (customer.debt || 0) + record.refundAmount; saveCustomers(); } }
        if (record.type === 'cash') {
          const moneyRecord = moneyRequests.find(m => m.note && m.note.includes(record.originalInvoiceId) && m.amount < 0);
          if (moneyRecord) { moneyRequests = moneyRequests.filter(m => m.id !== moneyRecord.id); saveMoneyRequests(); }
        }
        const sale = saleHistory.find(s => s.id === record.originalInvoiceId);
        if (sale) { const existingItem = sale.items.find(i => i.name === record.productName); if (existingItem) existingItem.qty += record.quantity; else sale.items.push({ name: record.productName, qty: record.quantity, price: record.price }); sale.total = sale.items.reduce((sum, i) => sum + (i.qty * i.price), 0); saveSaleHistory(); }
      }
      returnHistory = returnHistory.filter(r => r.id !== returnId);
      saveReturnHistory();
      renderReturnHistory();
      updateStats();
    }
  };

  // ===== EXPIRY FUNCTIONS =====
  function renderExpiryProducts() {
    const container = document.getElementById('expiryProductsList');
    if (!container) return;
    const search = document.getElementById('expirySearch')?.value.trim().toLowerCase() || '';
    const dateFilter = document.getElementById('expiryDateFilter')?.value || '';
    const statusFilter = document.getElementById('expiryStatusFilter')?.value || 'all';
    let filtered = warehouseProducts.filter(p => p.expiryDate);
    if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || p.barcode.includes(search));
    if (dateFilter) filtered = filtered.filter(p => p.expiryDate === dateFilter);
    if (statusFilter === 'expired') filtered = filtered.filter(p => p.expiryDate && new Date(p.expiryDate) < new Date());
    else if (statusFilter === 'near_expiry') { const nearDate = new Date(); nearDate.setDate(nearDate.getDate() + 30); filtered = filtered.filter(p => p.expiryDate && new Date(p.expiryDate) <= nearDate && new Date(p.expiryDate) >= new Date()); }
    if (!filtered.length) { container.innerHTML = '<p style="color:#94a3b8; text-align:center;">هیچ کاڵایەک نەدۆزرایەوە</p>'; return; }
    container.innerHTML = filtered.map(p => {
      const isExpired = new Date(p.expiryDate) < new Date();
      const isNear = !isExpired && new Date(p.expiryDate) <= new Date(new Date().setDate(new Date().getDate() + 30));
      return `<div class="movement-card" style="border-right: 4px solid ${isExpired ? '#dc2626' : isNear ? '#f59e0b' : '#059669'};">
        <div style="display:flex; justify-content:space-between;"><strong>${p.name}</strong><span>📅 ${p.expiryDate}</span></div>
        <div style="font-size:0.85rem; color:#64748b;">بارکۆد: ${p.barcode} | بڕ: ${p.quantity}</div>
        <div style="font-size:0.8rem; color:${isExpired ? '#dc2626' : isNear ? '#b45309' : '#059669'};">${isExpired ? '❌ بەسەرچووە' : isNear ? '⚠️ نزیکە لە بەسەرچوون' : '✅ باشە'}</div>
      </div>`;
    }).join('');
  }

  window.filterExpiryProducts = function() { renderExpiryProducts(); };

  function renderDamagedProducts() {

        <div style="font-size:0.85rem;">بڕ: ${d.quantity} | ${d.reason || 'بێ هۆکار'}</div>

  window.searchDamageProduct = function() {
    const query = document.getElementById('damageProductSearch').value.trim().toLowerCase();
    const suggestions = document.getElementById('damageProductSuggestions');
    if (!query) { suggestions.style.display = 'none'; return; }
    const filtered = warehouseProducts.filter(p => p.name.toLowerCase().includes(query) || p.barcode.includes(query));
    if (filtered.length) {
      suggestions.innerHTML = filtered.map(p => `<div class="suggestion-item" data-pid="${p.id}"><span>📦 ${p.name}</span><span style="font-size:0.8rem;">بارکۆد: ${p.barcode}</span><span style="font-size:0.8rem;">بڕ: ${p.quantity}</span></div>`).join('');
      suggestions.style.display = 'block';
      suggestions.querySelectorAll('.suggestion-item').forEach(item => {
        item.addEventListener('click', function() {
          const pid = parseInt(this.dataset.pid);
          const product = warehouseProducts.find(p => p.id === pid);
          if (product) { document.getElementById('damageProductSearch').value = product.name; document.getElementById('damageQuantity').max = product.quantity; }
          suggestions.style.display = 'none';
        });
      });
    } else { suggestions.style.display = 'none'; }
  };

  window.addDamagedProduct = function() {
    const productName = document.getElementById('damageProductSearch').value.trim();
    const quantity = parseInt(document.getElementById('damageQuantity').value);
    const reason = document.getElementById('damageReason').value.trim();
    if (!productName) { alert('تکایە کاڵایەک هەڵبژێرە'); return; }
    if (!quantity || quantity < 1) { alert('تکایە بڕی دروست بنووسە'); return; }
    const product = warehouseProducts.find(p => p.name === productName);
    if (!product) { alert('کاڵا نەدۆزرایەوە'); return; }
    if (product.quantity < quantity) { alert('بڕی کاڵا لە مخزندا کەمترە'); return; }
    product.quantity -= quantity;
    saveWarehouseProducts();
    const now = new Date();
    const dateStr = now.toLocaleString('ckb', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    expiredDamagedProducts.push({ id: 'D' + Math.floor(Math.random() * 9000 + 1000), date: dateStr, productName: product.name, barcode: product.barcode, quantity: quantity, reason: reason || 'تێکچوون', type: 'damage' });
    saveExpiryDamage();
    document.getElementById('damageProductSearch').value = '';
    document.getElementById('damageQuantity').value = '1';
    document.getElementById('damageReason').value = '';
    document.getElementById('damageProductSuggestions').style.display = 'none';
    renderDamagedProducts();
    renderProductsGrid();
    updateStats();
    alert('کاڵای تێکچوو تۆمارکرا');
  };

  window.deleteDamagedProduct = function(id) {
    if (!confirm('دڵنیایت لە سڕینەوەی ئەم تۆمارە؟')) return;
    const record = expiredDamagedProducts.find(d => d.id === id);
    if (record) { const product = warehouseProducts.find(p => p.name === record.productName); if (product) { product.quantity += record.quantity; saveWarehouseProducts(); } }
    expiredDamagedProducts = expiredDamagedProducts.filter(d => d.id !== id);
    saveExpiryDamage();
    renderDamagedProducts();
    renderProductsGrid();
    updateStats();
  };

  // ===== PURCHASE FUNCTIONS =====
  window.searchPurchaseProduct = function() {
    const query = document.getElementById('purchaseProductSearch').value.trim().toLowerCase();
    const suggestions = document.getElementById('purchaseProductSuggestions');
    if (!query) { suggestions.style.display = 'none'; return; }
    const filtered = warehouseProducts.filter(p => p.name.toLowerCase().includes(query) || p.barcode.includes(query));
    if (filtered.length) {
      suggestions.innerHTML = filtered.map(p => `<div class="suggestion-item" data-pid="${p.id}"><span>📦 ${p.name}</span><span style="font-size:0.8rem;">بارکۆد: ${p.barcode}</span><span style="font-size:0.8rem;">نرخی کڕین: ${p.buyPrice} د.ع</span></div>`).join('');
      suggestions.style.display = 'block';
      suggestions.querySelectorAll('.suggestion-item').forEach(item => {
        item.addEventListener('click', function() {
          const prod = warehouseProducts.find(p => p.id === parseInt(this.dataset.pid));
          if (prod) { const existing = purchaseCart.find(c => c.product.id === prod.id); if (existing) existing.quantity++; else purchaseCart.push({ product: prod, quantity: 1 }); renderPurchaseCart(); }
          suggestions.style.display = 'none';
          document.getElementById('purchaseProductSearch').value = '';
        });
      });
    } else { suggestions.style.display = 'none'; }

  window.searchPurchasePartner = function() {
    const query = document.getElementById('purchasePartnerSearch').value.trim().toLowerCase();
    const suggestions = document.getElementById('purchasePartnerSuggestions');
    if (!query) { suggestions.style.display = 'none'; return; }
    const filtered = partners.filter(p => p.name.toLowerCase().includes(query) || p.phone.includes(query));
    if (filtered.length) {
      suggestions.innerHTML = filtered.map(p => `<div class="suggestion-item" data-pid="${p.id}"><span>🤝 ${p.name}</span><span style="font-size:0.8rem;">📱 ${p.phone}</span><span style="font-size:0.8rem;">قەرز: ${(p.debt||0).toLocaleString()}</span></div>`).join('');
      suggestions.style.display = 'block';
      suggestions.querySelectorAll('.suggestion-item').forEach(item => {
        item.addEventListener('click', function() {
          const pid = parseInt(this.dataset.pid);
          selectedPurchasePartner = partners.find(p => p.id === pid);
          if (selectedPurchasePartner) { document.getElementById('selectedPurchasePartnerBadge').innerHTML = `<span class="customer-badge">🤝 ${selectedPurchasePartner.name}</span>`; document.getElementById('purchasePartnerSearch').value = selectedPurchasePartner.name; updatePurchaseInvoicePreview(); }
          suggestions.style.display = 'none';
        });
      });

  function renderPurchaseCart() {
    const container = document.getElementById('purchaseCartItems');
    const totalEl = document.getElementById('purchaseTotalAmount');
    if (!container) return;
    if (!purchaseCart.length) { container.innerHTML = '<p style="color:#94a3b8; text-align:center;">کاڵا زیاد نەکراوە</p>'; if (totalEl) totalEl.textContent = '0'; return; }
    container.innerHTML = purchaseCart.map((item, idx) => `
      <div class="cart-item">
        <div class="cart-item-details"><span>📦 ${item.product.name}</span><span>${item.product.buyPrice} د.ع</span></div>
        <div class="cart-item-actions">
          <button class="btn-icon" onclick="updatePurchaseCartQty(${idx}, -1)"><i class="fas fa-minus-circle"></i></button>
          <input type="number" value="${item.quantity}" min="1" onchange="setPurchaseCartQty(${idx}, this.value)">
          <button class="btn-icon" onclick="updatePurchaseCartQty(${idx}, 1)"><i class="fas fa-plus-circle"></i></button>
          <button class="btn-icon" onclick="removePurchaseCartItem(${idx})"><i class="fas fa-trash-alt" style="color:#b91c1c;"></i></button>
        </div>
      </div>`).join('');
    const total = purchaseCart.reduce((s, i) => s + (i.product.buyPrice * i.quantity), 0);
    if (totalEl) totalEl.textContent = total.toLocaleString();
  }

  window.updatePurchaseCartQty = function(idx, delta) { if (purchaseCart[idx].quantity + delta < 1) return; purchaseCart[idx].quantity += delta; renderPurchaseCart(); updatePurchaseInvoicePreview(); };
  window.setPurchaseCartQty = function(idx, val) { const q = parseInt(val); if (!isNaN(q) && q > 0) { purchaseCart[idx].quantity = q; renderPurchaseCart(); updatePurchaseInvoicePreview(); } };
  window.removePurchaseCartItem = function(idx) { purchaseCart.splice(idx, 1); renderPurchaseCart(); updatePurchaseInvoicePreview(); };

  function updatePurchaseInvoicePreview() {
    const invNumber = document.getElementById('purchaseInvNumber');
    const dateSpan = document.getElementById('purchaseInvoiceDate');
    const body = document.getElementById('purchaseInvoiceBody');
    const totalSpan = document.getElementById('purchaseInvTotal');
    const partnerInfo = document.getElementById('purchaseInvoicePartnerInfo');
    if (invNumber) invNumber.textContent = 'P' + (Math.floor(Math.random() * 9000) + 1000);
    if (dateSpan) dateSpan.textContent = new Date().toLocaleString('ckb');
    if (!purchaseCart.length) { if (body) body.innerHTML = '<tr><td colspan="4">هیچ کاڵایەک نییە<\/td></tr>'; if (totalSpan) totalSpan.textContent = '0'; }
    else { if (body) body.innerHTML = purchaseCart.map(i => `<tr><td>${i.product.name}</td><td>${i.quantity}</td><td>${i.product.buyPrice}</td><td>${i.product.buyPrice * i.quantity}</td></tr>`).join(''); if (totalSpan) totalSpan.textContent = purchaseCart.reduce((s, i) => s + (i.product.buyPrice * i.quantity), 0).toLocaleString(); }
    if (partnerInfo) partnerInfo.innerHTML = selectedPurchasePartner ? `🤝 شەریک: ${selectedPurchasePartner.name}` : '🤝 شەریک: هەڵنەبژێردراوە';
  }

  function renderPurchaseHistory() {

    const dateFrom = document.getElementById('purchaseHistoryDateFrom')?.value || '';

    if (dateTo) filtered = filtered.filter(p => p.date.includes(dateTo));

        <div>

  window.printPurchaseInvoice = function(invId) {
    const purchase = purchaseHistory.find(p => p.id === invId);
    if (!purchase) return;
    const w = window.open('', '_blank');
    w.document.write(`<html dir="rtl"><head><title>کڕین ${invId}</title><style>body{font-family:'Segoe UI';padding:2rem;}table{width:100%;border-collapse:collapse;}td,th{padding:8px;border-bottom:1px solid #ccc;}</style></head><body><h2>فاکتوورە ${invId}</h2><p>${purchase.date}</p><p>🤝 ${purchase.partner}</p><table><tr><th>کاڵا</th><th>بڕ</th><th>نرخ</th></tr>${purchase.items.map(i => `<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.price}</td></tr>`).join('')}</table><h3>کۆ: ${purchase.total}</h3></body></html>`);
    w.document.close();
    w.print();
  };

  window.deletePurchaseInvoice = function(invId) {
    if (!confirm(`دڵنیایت لە سڕینەوەی کڕینی ${invId}؟`)) return;
    purchaseHistory = purchaseHistory.filter(p => p.id !== invId);
    savePurchaseHistory();
    renderPurchaseHistory();
    document.getElementById('purchaseHistoryInvoiceDetail').style.display = 'none';
    updateStats();
  };

  window.completePurchase = function() {
    if (!purchaseCart.length) { alert('هیچ کاڵایەک نییە'); return; }
    if (!selectedPurchasePartner) { alert('تکایە شەریکێک هەڵبژێرە'); return; }
    const total = purchaseCart.reduce((s, i) => s + (i.product.buyPrice * i.quantity), 0);
    const invId = 'P' + (Math.floor(Math.random() * 9000) + 1000);
    const now = new Date();
    const dateStr = now.toLocaleString('ckb', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    const isCash = !document.getElementById('creditPurchaseCheck')?.checked;
    purchaseHistory.unshift({ id: invId, date: dateStr, partner: selectedPurchasePartner.name, partnerId: selectedPurchasePartner.id, total: total, isCash: isCash, items: purchaseCart.map(i => ({ name: i.product.name, qty: i.quantity, price: i.product.buyPrice })) });
    savePurchaseHistory();
    purchaseCart.forEach(item => { const product = warehouseProducts.find(p => p.id === item.product.id); if (product) product.quantity += item.quantity; });
    saveWarehouseProducts();
    if (!isCash) { selectedPurchasePartner.debt = (selectedPurchasePartner.debt || 0) + total; savePartners(); }
    
    if (isCash) {
      moneyRequests.push({
        id: 'PUR-MONEY' + Date.now(),
        date: dateStr,
        type: 'purchase',

    if (!agentSaleCart.length) { alert('هیچ کاڵایەک نییە'); return; }
    const total = agentSaleCart.reduce((s, i) => s + (i.price * i.quantity), 0);
    const invId = 'AS' + (Math.floor(Math.random() * 9000) + 1000);
    const now = new Date();
    const dateStr = now.toLocaleString('ckb', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    agentSaleCart.forEach(item => { const invItem = currentSaleAgent.inventory.find(i => i.productName === item.productName); if (invItem) invItem.sold = (invItem.sold || 0) + item.quantity; });

    saleHistory.unshift({ id: invId, date: dateStr, customer: customerName, agent: currentSaleAgent.name, total: total, items: agentSaleCart.map(i => ({ name: i.productName, qty: i.quantity, price: i.price })) });

        type: 'agent_sale',

  function renderGiveAgentCart() {
    const container = document.getElementById('giveAgentCartItems');
    const totalItemsEl = document.getElementById('giveAgentTotalItems');
    if (!container) return;
    if (!giveAgentCart.length) { container.innerHTML = '<p style="color:#94a3b8; text-align:center;">کاڵا زیاد نەکراوە</p>'; if (totalItemsEl) totalItemsEl.textContent = '0'; return; }
    container.innerHTML = giveAgentCart.map((item, idx) => `
      <div class="cart-item">
        <div class="cart-item-details"><span>📦 ${item.productName}</span><span>${item.price} د.ع</span></div>
        <div class="cart-item-actions">
          <button class="btn-icon" onclick="updateGiveAgentQty(${idx}, -1)"><i class="fas fa-minus-circle"></i></button>
          <input type="number" value="${item.quantity}" min="1" max="${item.maxQty}" onchange="setGiveAgentQty(${idx}, this.value)">
          <button class="btn-icon" onclick="updateGiveAgentQty(${idx}, 1)"><i class="fas fa-plus-circle"></i></button>
          <button class="btn-icon" onclick="removeGiveAgentItem(${idx})"><i class="fas fa-trash-alt" style="color:#b91c1c;"></i></button>
        </div>
      </div>`).join('');
    const total = giveAgentCart.reduce((s, i) => s + i.quantity, 0);
    if (totalItemsEl) totalItemsEl.textContent = total;
  }

  window.updateGiveAgentQty = function(idx, delta) {
    const newQty = giveAgentCart[idx].quantity + delta;
    if (newQty < 1 || newQty > giveAgentCart[idx].maxQty) return;
    giveAgentCart[idx].quantity = newQty;
    renderGiveAgentCart();
  };

  window.setGiveAgentQty = function(idx, val) {
    const q = parseInt(val);
    if (!isNaN(q) && q > 0 && q <= giveAgentCart[idx].maxQty) { giveAgentCart[idx].quantity = q; renderGiveAgentCart(); }
  };

  window.removeGiveAgentItem = function(idx) { giveAgentCart.splice(idx, 1); renderGiveAgentCart(); };

  window.completeGiveAgent = function() {
    if (!selectedGiveAgent) { alert('تکایە مەندوبێک هەڵبژێرە'); return; }
    if (!giveAgentCart.length) { alert('هیچ کاڵایەک نییە'); return; }
    const invId = 'GA' + (Math.floor(Math.random() * 9000) + 1000);
    const now = new Date();
    const dateStr = now.toLocaleString('ckb', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    giveAgentCart.forEach(item => {
      const product = warehouseProducts.find(p => p.id === item.productId);
      if (product) product.quantity = Math.max(0, product.quantity - item.quantity);
      if (!selectedGiveAgent.inventory) selectedGiveAgent.inventory = [];
      const existing = selectedGiveAgent.inventory.find(i => i.productId === item.productId);
      if (existing) existing.quantity += item.quantity;
      else selectedGiveAgent.inventory.push({ productId: item.productId, productName: item.productName, barcode: item.barcode, quantity: item.quantity, sold: 0, returned: 0, price: item.price });
    });
    saveWarehouseProducts();
    saveAgents();
    if (!selectedGiveAgent.movements) selectedGiveAgent.movements = [];
    selectedGiveAgent.movements.push({ type: 'give', date: dateStr, note: document.getElementById('giveAgentNote')?.value.trim() || '', invoiceId: invId, items: giveAgentCart.map(i => ({ productName: i.productName, quantity: i.quantity })) });
    saveAgents();
    giveAgentCart = [];
    renderGiveAgentCart();
    renderProductsGrid();
    updateStats();
    document.getElementById('giveAgentNote').value = '';
    alert(`پێدانی کاڵا بە ${selectedGiveAgent.name} تۆمارکرا!`);
  };

  window.deleteSalaryRecord = function(employeeId, month) {
    if (!confirm(`دڵنیایت لە سڕینەوەی موچەی مانگی ${month}؟`)) return;
    const emp = employees.find(e => e.id === employeeId);
    if (!emp) return;
    emp.salaryHistory = emp.salaryHistory?.filter(s => s.month !== month) || [];
    if (emp.salaryHistory.length > 0) emp.salary = emp.salaryHistory[emp.salaryHistory.length - 1].amount;
    else emp.salary = 0;
    saveEmployees();
    
    const moneyRecord = moneyRequests.find(r => r.note && r.note.includes(month) && r.type === 'salary' && r.entityName === emp.name);
    if (moneyRecord) moneyRequests = moneyRequests.filter(r => r.id !== moneyRecord.id);
    saveMoneyRequests();
    
    renderEmployeeSalaryHistory();
    renderEmployeeDetail(emp);
    alert('موچە سڕکرایەوە');
  };

    if (new Date(start) > new Date(end)) { alert('بەرواری دەستپێک دەبێت پێش بەرواری کۆتایی بێت'); return; }
    if (!selectedEmployeeForLeave.leaves) selectedEmployeeForLeave.leaves = [];
    selectedEmployeeForLeave.leaves.push({ start: start, end: end, reason: reason || 'بێ هۆکار' });
    saveEmployees();
    renderEmployeeLeaveHistory();
    renderEmployeeDetail(selectedEmployeeForLeave);
    document.getElementById('employeeLeaveReason').value = '';
    document.getElementById('employeeLeaveStart').value = '';
    document.getElementById('employeeLeaveEnd').value = '';
    alert('مۆڵەتی کارمەند بە سەرکەوتوویی تۆمارکرا');
  };

  function renderEmployeeLeaveHistory() {
    const container = document.getElementById('employeeLeaveList');
    if (!container) return;
    const allLeaves = [];
    employees.forEach(emp => { if (emp.leaves) { emp.leaves.forEach(l => { allLeaves.push({ ...l, employeeName: emp.name, employeeId: emp.id }); }); } });
    allLeaves.sort((a, b) => new Date(b.start) - new Date(a.start));
    if (!allLeaves.length) { container.innerHTML = '<p style="color:#94a3b8; text-align:center;">هیچ مۆڵەتێک تۆمار نەکراوە</p>'; return; }
    container.innerHTML = allLeaves.map(l => `
      <div class="history-row">
        <div><strong>${l.employeeName}</strong></div>
        <div>📅 ${l.start} → ${l.end}</div>
        <div style="font-size:0.8rem;">${l.reason}</div>
        <div><button class="btn-icon" onclick="deleteLeaveRecord(${l.employeeId}, '${l.start}', '${l.end}')" title="سڕینەوە"><i class="fas fa-trash-alt" style="color:#dc2626;"></i></button></div>
      </div>`).join('');
  }

  window.deleteLeaveRecord = function(employeeId, start, end) {
    if (!confirm(`دڵنیایت لە سڕینەوەی مۆڵەتی ${start} - ${end}؟`)) return;
    const emp = employees.find(e => e.id === employeeId);
    if (!emp) return;
    emp.leaves = emp.leaves?.filter(l => !(l.start === start && l.end === end)) || [];
    saveEmployees();
    renderEmployeeLeaveHistory();
    renderEmployeeDetail(emp);
    alert('مۆڵەت سڕکرایەوە');
  };

  // ===== TAB EVENT LISTENERS =====
  document.addEventListener('click', function(e) {
    if (e.target.classList.contains('tab')) {
      // Purchase tabs
      if (e.target.dataset.purchasetab) {
        document.querySelectorAll('[data-purchasetab]').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('newPurchasePanel').classList.toggle('active', e.target.dataset.purchasetab === 'newPurchase');
        document.getElementById('purchaseHistoryPanel').classList.toggle('active', e.target.dataset.purchasetab === 'history');
        document.getElementById('purchaseReturnPanel').classList.toggle('active', e.target.dataset.purchasetab === 'return');
        if (e.target.dataset.purchasetab === 'history') renderPurchaseHistory();
        if (e.target.dataset.purchasetab === 'return') renderPurchaseReturnHistory();
      }
      // Money tabs
      if (e.target.dataset.moneytab) {
        document.querySelectorAll('[data-moneytab]').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('moneyNewPanel').classList.toggle('active', e.target.dataset.moneytab === 'new');
        document.getElementById('moneyHistoryPanel').classList.toggle('active', e.target.dataset.moneytab === 'history');
        if (e.target.dataset.moneytab === 'history') renderMoneyHistory();
      }
      // Money Spend tabs
      if (e.target.dataset.spendtab) {
        document.querySelectorAll('[data-spendtab]').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('moneyExpensePanel').classList.toggle('active', e.target.dataset.spendtab === 'expense');
        document.getElementById('moneyGivePanel').classList.toggle('active', e.target.dataset.spendtab === 'give');
        if (e.target.dataset.spendtab === 'expense') { renderExpenseHistory(); updateExpenseStats(); }
        if (e.target.dataset.spendtab === 'give') { renderGiveHistory(); updateGiveStats(); }
      }
      // Partner tabs
      if (e.target.dataset.partnertab) {
        document.querySelectorAll('[data-partnertab]').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('partnersListPanel').classList.toggle('active', e.target.dataset.partnertab === 'list');
        document.getElementById('partnersAddPanel').classList.toggle('active', e.target.dataset.partnertab === 'add');
        if (e.target.dataset.partnertab === 'list') renderPartnersList();
      }
      // Warehouse tabs
      if (e.target.dataset.waretab) {
        document.querySelectorAll('[data-waretab]').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('wareAddPanel').classList.toggle('active', e.target.dataset.waretab === 'add');
        document.getElementById('wareListPanel').classList.toggle('active', e.target.dataset.waretab === 'list');
        document.getElementById('warePurchasePanel').classList.toggle('active', e.target.dataset.waretab === 'purchase');
        if (e.target.dataset.waretab === 'list') renderProductsGrid();
        if (e.target.dataset.waretab === 'purchase') renderWarePurchaseCart();
      }
      // Persons tabs
      if (e.target.dataset.ptab) {
        document.querySelectorAll('[data-ptab]').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('personsListPanel').classList.toggle('active', e.target.dataset.ptab === 'list');
        document.getElementById('personsAddPanel').classList.toggle('active', e.target.dataset.ptab === 'add');
        if (e.target.dataset.ptab === 'list') renderPersonsList();
      }
      // Sales tabs
      if (e.target.dataset.tab) {
        document.querySelectorAll('[data-tab]').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('newSalePanel').classList.toggle('active', e.target.dataset.tab === 'newSale');
        document.getElementById('historyPanel').classList.toggle('active', e.target.dataset.tab === 'history');
        document.getElementById('returnPanel').classList.toggle('active', e.target.dataset.tab === 'return');
        if (e.target.dataset.tab === 'history') renderHistory();
        if (e.target.dataset.tab === 'return') renderReturnHistory();
      }
      // Agent tabs
      if (e.target.dataset.agenttab) {
        document.querySelectorAll('[data-agenttab]').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        const tab = e.target.dataset.agenttab;
        document.getElementById('agentsListPanel').classList.toggle('active', tab === 'list');
        document.getElementById('agentsAddPanel').classList.toggle('active', tab === 'add');
        document.getElementById('agentsInventoryPanel').classList.toggle('active', tab === 'inventory');
        document.getElementById('agentsSalePanel').classList.toggle('active', tab === 'sale');
        document.getElementById('agentsReturnPanel').classList.toggle('active', tab === 'return');
        document.getElementById('agentsWasslPanel').classList.toggle('active', tab === 'wassl');
        if (tab === 'list') renderAgentsList();
        if (tab === 'inventory') { selectedAgentForInventory = null; document.getElementById('selectedAgentInventoryBadge').innerHTML = ''; document.getElementById('agentInventorySearch').value = ''; document.getElementById('agentInventoryContent').innerHTML = '<p style="color:#94a3b8; text-align:center;">تکایە مەندوبێک هەڵبژێرە بۆ بینینی جەرد</p>'; }
        if (tab === 'sale') { currentSaleAgent = null; agentSaleCart = []; agentSaleCustomer = null; renderAgentSaleCart(); document.getElementById('agentProductSearch').value = ''; document.getElementById('agentProductSuggestions').style.display = 'none'; }
        if (tab === 'return') { selectedAgentForReturn = null; agentReturnCart = []; document.getElementById('selectedAgentReturnBadge').innerHTML = ''; document.getElementById('agentReturnSearch').value = ''; document.getElementById('agentReturnProductSearch').value = ''; document.getElementById('agentReturnInventoryList').innerHTML = '<p style="color:#94a3b8; text-align:center;">تکایە مەندوبێک هەڵبژێرە</p>'; renderAgentReturnCart(); }
        if (tab === 'wassl') { selectedAgentForWassl = null; document.getElementById('selectedAgentWasslInfo').style.display = 'none'; }
      }
      // Expiry tabs
      if (e.target.dataset.expirytab) {
        document.querySelectorAll('[data-expirytab]').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('expiryExpiryPanel').classList.toggle('active', e.target.dataset.expirytab === 'expiry');
        document.getElementById('expiryDamagePanel').classList.toggle('active', e.target.dataset.expirytab === 'damage');
        if (e.target.dataset.expirytab === 'expiry') renderExpiryProducts();
        if (e.target.dataset.expirytab === 'damage') renderDamagedProducts();
      }
      // Employee tabs
      if (e.target.dataset.emptab) {
        document.querySelectorAll('[data-emptab]').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        const tab = e.target.dataset.emptab;
        document.getElementById('employeesListPanel').classList.toggle('active', tab === 'list');
        document.getElementById('employeesAddPanel').classList.toggle('active', tab === 'add');
        document.getElementById('employeesSalaryPanel').classList.toggle('active', tab === 'salary');
        document.getElementById('employeesLeavePanel').classList.toggle('active', tab === 'leave');
        if (tab === 'list') renderEmployeesList();
        if (tab === 'salary') renderEmployeeSalaryHistory();
        if (tab === 'leave') renderEmployeeLeaveHistory();
      }
    }
    // Settings tabs
    if (e.target.classList.contains('settings-tab')) {
      document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      const tab = e.target.dataset.stab;
      document.getElementById('settingsBackupPanel').classList.toggle('active', tab === 'backup');
      document.getElementById('settingsAppearancePanel').classList.toggle('active', tab === 'appearance');
      document.getElementById('settingsLayoutPanel').classList.toggle('active', tab === 'layout');
      if (tab === 'layout') renderSettingsLayoutModules();
      if (tab === 'appearance') populateAppearanceFields();
      if (tab === 'backup') renderBackupHistory();
    }
  });

})();
</script>
</body>
</html>
