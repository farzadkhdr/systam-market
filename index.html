<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی بەڕێوەبردنی ئەلکترۆنیات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --success: #2ec4b6;
            --danger: #e71d36;
            --warning: #f8961e;
            --info: #4895ef;
            --dark: #212529;
            --light: #f8f9fa;
            --border-radius: 10px;
            --box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f0f2f5; color: var(--dark); }

        /* Sidebar & Layout */
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--dark); color: white; padding: 20px 0; transition: all 0.3s; }
        .sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid #3d4043; text-align: center; }
        .sidebar-menu { list-style: none; margin-top: 20px; }
        .menu-item { padding: 12px 20px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover, .menu-item.active { background: var(--primary); color: white; }
        
        .main-content { flex: 1; padding: 25px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* واسڵکردنی پارە - ستایڵی نوێ */
        .payment-container { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        .card { background: white; border-radius: var(--border-radius); box-shadow: var(--box-shadow); padding: 20px; }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        
        .suggestions-list {
            position: absolute; top: 100%; left: 0; right: 0; background: white;
            border: 1px solid #ddd; border-radius: 0 0 8px 8px; z-index: 1000;
            max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .suggestion-item:hover { background: #f0f4ff; }

        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th, .history-table td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        .badge-time { font-size: 0.8rem; color: #666; background: #eee; padding: 2px 6px; border-radius: 4px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }

        .alert-info { background: #e7f3ff; color: #004085; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <nav class="sidebar">
        <div class="sidebar-header"><h3>سیستەمی من</h3></div>
        <ul class="sidebar-menu">
            <li class="menu-item" onclick="showTab('dashboard')"><i class="fas fa-home"></i> سەرەکی</li>
            <li class="menu-item active" onclick="showTab('payments')"><i class="fas fa-money-bill-wave"></i> واسڵکردنی پارە</li>
            <li class="menu-item" onclick="showTab('reports')"><i class="fas fa-chart-line"></i> ڕاپۆرتەکان</li>
        </ul>
    </nav>

    <main class="main-content">
        <div id="payments" class="tab-content active">
            <h2 class="mb-4">بەڕێوەبردنی واسڵکردنی پارە (قەبض)</h2>
            <div class="payment-container">
                <div class="card">
                    <div class="alert-info" id="selectedUserBox">
                        <i class="fas fa-user-check"></i> <span id="selectedUserName">دیاری نەکراوە</span>
                    </div>
                    
                    <div class="form-group">
                        <label>گەڕان بۆ ناو (کڕیار یان شەریکە)</label>
                        <input type="text" id="paymentSearch" class="form-control" placeholder="ناو لێرە بنووسە..." autocomplete="off">
                        <div id="paymentSuggestions" class="suggestions-list"></div>
                    </div>

                    <div class="form-group">
                        <label>بڕی پارەی واسڵکراو</label>
                        <input type="number" id="payAmount" class="form-control" placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label>بەرواری واسڵکردن</label>
                        <input type="date" id="payDate" class="form-control">
                    </div>

                    <button class="btn btn-primary" onclick="handleNewPayment()">
                        <i class="fas fa-save"></i> تۆمارکردنی قەبض
                    </button>
                </div>

                <div class="card">
                    <h4><i class="fas fa-history"></i> مێژووی واسڵکردنی کەسەکە</h4>
                    <hr>
                    <div style="max-height: 500px; overflow-y: auto;">
                        <table class="history-table">
                            <thead>
                                <tr>
                                    <th>بەروار و کات</th>
                                    <th>بڕی پارە</th>
                                    <th>کردار</th>
                                </tr>
                            </thead>
                            <tbody id="paymentHistoryList">
                                <tr><td colspan="3" style="text-align: center; padding: 20px; color: #888;">تکایە ناوێک هەڵبژێرە</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="dashboard" class="tab-content"><h2>بەشی سەرەکی</h2></div>
        <div id="reports" class="tab-content"><h2>ڕاپۆرتەکان</h2></div>
    </main>
</div>

<script>
    // --- داتای سیستم (ئەگەر لە فایلە کۆنەکەت هەبوو، ئەمانە بەکار دەهێنێتەوە) ---
    let customers = JSON.parse(localStorage.getItem('customers')) || [
        {id: 1, name: "کاروان احمد", balance: 500000},
        {id: 2, name: "کۆمپانیای سۆنار", balance: 0}
    ];
    let allPayments = JSON.parse(localStorage.getItem('payments_history')) || [];
    let currentSelectedPerson = null;

    // ڕێکخستنی بەروار
    document.getElementById('payDate').valueAsDate = new Date();

    // نیشاندانی تابەکان
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- فەنکشنەکانی واسڵکردن ---

    const searchInput = document.getElementById('paymentSearch');
    const suggestionBox = document.getElementById('paymentSuggestions');

    searchInput.addEventListener('input', function() {
        const query = this.value.toLowerCase().trim();
        suggestionBox.innerHTML = '';
        
        if (query.length < 1) { suggestionBox.style.display = 'none'; return; }

        // گەڕان لەناو کڕیارەکان (دەتوانیت suppliersـیش زیاد بکەیت لێرە)
        const matches = customers.filter(c => c.name.toLowerCase().includes(query));

        if (matches.length > 0) {
            matches.forEach(m => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<i class="fas fa-user"></i> ${m.name}`;
                div.onclick = () => selectPerson(m.name);
                suggestionBox.appendChild(div);
            });
            suggestionBox.style.display = 'block';
        } else {
            suggestionBox.style.display = 'none';
        }
    });

    function selectPerson(name) {
        currentSelectedPerson = name;
        searchInput.value = name;
        suggestionBox.style.display = 'none';
        document.getElementById('selectedUserBox').style.display = 'block';
        document.getElementById('selectedUserName').innerText = "دیاریکراوە: " + name;
        loadPersonHistory(name);
    }

    function handleNewPayment() {
        const amount = document.getElementById('payAmount').value;
        const date = document.getElementById('payDate').value;
        const now = new Date();
        const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

        if (!currentSelectedPerson || !amount || amount <= 0) {
            alert("تکایە ناوێک و بڕی پارەکە بە دروستی دیاری بکە");
            return;
        }

        const paymentEntry = {
            id: Date.now(),
            name: currentSelectedPerson,
            amount: parseFloat(amount),
            date: date,
            time: time,
            timestamp: now.getTime()
        };

        allPayments.push(paymentEntry);
        localStorage.setItem('payments_history', JSON.stringify(allPayments));

        // پاککردنەوە و نوێکردنەوە
        document.getElementById('payAmount').value = '';
        loadPersonHistory(currentSelectedPerson);
        alert("واسڵکردنەکە بەسەرکەوتوویی تۆمارکرا");
    }

    function loadPersonHistory(name) {
        const list = document.getElementById('paymentHistoryList');
        const filtered = allPayments.filter(p => p.name === name)
                                   .sort((a, b) => b.timestamp - a.timestamp);

        if (filtered.length === 0) {
            list.innerHTML = '<tr><td colspan="3" style="text-align: center;">هیچ مێژوویەکی نییە</td></tr>';
            return;
        }

        list.innerHTML = filtered.map(p => `
            <tr>
                <td>${p.date} <span class="badge-time">${p.time}</span></td>
                <td style="color: var(--success); font-weight: bold;">${p.amount.toLocaleString()} د.ن</td>
                <td>
                    <button onclick="deletePayment(${p.id})" style="color: var(--danger); border: none; background:none; cursor:pointer;">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    function deletePayment(id) {
        if (confirm('ئایا دڵنیای لە سڕینەوە؟')) {
            allPayments = allPayments.filter(p => p.id !== id);
            localStorage.setItem('payments_history', JSON.stringify(allPayments));
            loadPersonHistory(currentSelectedPerson);
        }
    }

    // داخستنی لیستەکە کاتێک کلیک لە دەرەوە دەکرێت
    window.onclick = function(event) {
        if (!event.target.matches('#paymentSearch')) {
            suggestionBox.style.display = 'none';
        }
    }
</script>

</body>
</html>
