<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاکتوری سپۆنسەر</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 30px;
            max-width: 650px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #1a237e;
            font-size: 28px;
            margin-bottom: 25px;
            border-bottom: 3px solid #1a237e;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 15px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
            background: #fafafa;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #1a237e;
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            min-width: 140px;
        }

        .btn-primary {
            background: #1a237e;
            color: white;
        }

        .btn-primary:hover {
            background: #0d1457;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 35, 126, 0.3);
        }

        .btn-success {
            background: #2e7d32;
            color: white;
        }

        .btn-success:hover {
            background: #1b5e20;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.3);
        }

        .btn-danger {
            background: #c62828;
            color: white;
        }

        .btn-danger:hover {
            background: #b71c1c;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(198, 40, 40, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* ===== فاکتۆر ===== */
        .invoice-wrapper {
            margin-top: 30px;
            display: none;
        }

        .invoice-wrapper.show {
            display: block;
            animation: fadeSlide 0.5s ease;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .invoice {
            background: #ffffff;
            border: 3px solid #1a237e;
            border-radius: 16px;
            padding: 30px 30px 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .invoice-header {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #1a237e;
            border-bottom: 3px double #1a237e;
            padding-bottom: 15px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .invoice-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #e0e0e0;
            font-size: 17px;
        }

        .invoice-row:last-of-type {
            border-bottom: none;
        }

        .invoice-label {
            font-weight: 700;
            color: #444;
        }

        .invoice-value {
            color: #1a237e;
            font-weight: 600;
            text-align: left;
        }

        .invoice-value.amount {
            font-size: 24px;
            color: #b71c1c;
            font-weight: 800;
        }

        .signature-section {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 2px solid #1a237e;
            display: flex;
            justify-content: space-between;
            gap: 40px;
        }

        .signature-box {
            flex: 1;
            text-align: center;
        }

        .signature-box .label {
            font-weight: 700;
            color: #333;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .signature-line {
            border-bottom: 2px solid #333;
            height: 40px;
            margin-top: 8px;
        }

        .signature-name {
            font-size: 14px;
            color: #555;
            margin-top: 6px;
            font-weight: 600;
        }

        .footer-thanks {
            text-align: center;
            font-size: 20px;
            color: #1a237e;
            margin-top: 28px;
            font-weight: 600;
        }

        .invoice-number {
            text-align: left;
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .company-info {
            text-align: center;
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 10px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            .invoice {
                padding: 18px;
            }
            .invoice-row {
                font-size: 15px;
                flex-wrap: wrap;
                gap: 6px;
            }
            .signature-section {
                flex-direction: column;
                gap: 20px;
            }
            .btn-group {
                flex-direction: column;
            }
            .btn {
                min-width: unset;
            }
        }

        /* دەق بۆ PDF */
        .invoice * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Toast notification */
        .toast {
            visibility: hidden;
            min-width: 250px;
            background: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
            font-weight: 600;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
        }

        .toast.success {
            background: #2e7d32;
        }

        .toast.error {
            background: #c62828;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📄 فاکتوری سپۆنسەر</h1>

        <!-- فۆرم -->
        <div class="form-group">
            <label>👤 ناوی کڕیار (ئەو کەسەی فاکتۆر بۆ دەکرێت)</label>
            <input type="text" id="customerName" placeholder="نمونە: محەممەد عەلی" required>
        </div>

        <div class="form-group">
            <label>👨‍💻 ناوی پرۆگرامێر (من)</label>
            <input type="text" id="programmerName" placeholder="نمونە: ئەحمەد ڕەشید" required>
            <small style="color:#666; display:block; margin-top:4px;">ئەم ناوە لە فاکتۆردا دەردەکەوێت</small>
        </div>

        <div class="form-group">
            <label>📅 بەروار</label>
            <input type="date" id="invoiceDate">
        </div>

        <div class="form-group">
            <label>🏷️ جۆری سپۆنسەر</label>
            <input type="text" id="sponsorType" placeholder="نمونە: سپۆنسەری زێرین / پلاتین" required>
        </div>

        <div class="form-group">
            <label>💰 بڕی پارەی سپۆنسەر (دینار)</label>
            <input type="number" id="amount" placeholder="بڕی پارە بە دینار" step="0.001" min="0" required>
        </div>

        <div class="form-group">
            <label>💳 شێوازی پارەدان</label>
            <select id="paymentMethod">
                <option value="نەقدی">نەقدی</option>
                <option value="کارتی بانکی">کارتی بانکی</option>
                <option value="ڤاتەر">ڤاتەر</option>
                <option value="کریپتۆ">کریپتۆ</option>
            </select>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="generateInvoice()">🚀 دروستکردنی فاکتۆر</button>
            <button class="btn btn-success" id="pdfBtn" onclick="downloadPDF()" disabled>📥 داگرتنی PDF</button>
            <button class="btn btn-danger" onclick="clearAll()">🗑️ پاککردنەوە</button>
        </div>

        <!-- ===== فاکتۆر ===== -->
        <div class="invoice-wrapper" id="invoiceWrapper">
            <div class="invoice" id="invoiceContent">
                <div class="invoice-header">فاکتوری سپۆنسەر</div>
                <div class="invoice-number" id="invoiceNumber">ژمارە: ---</div>

                <div class="invoice-row">
                    <span class="invoice-label">👤 ناوی کڕیار</span>
                    <span class="invoice-value" id="showCustomer">---</span>
                </div>
                <div class="invoice-row">
                    <span class="invoice-label">👨‍💻 ناوی پرۆگرامێر</span>
                    <span class="invoice-value" id="showName">---</span>
                </div>
                <div class="invoice-row">
                    <span class="invoice-label">📅 بەروار</span>
                    <span class="invoice-value" id="showDate">---</span>
                </div>
                <div class="invoice-row">
                    <span class="invoice-label">🏷️ جۆری سپۆنسەر</span>
                    <span class="invoice-value" id="showSponsor">---</span>
                </div>
                <div class="invoice-row">
                    <span class="invoice-label">💰 بڕی پارە</span>
                    <span class="invoice-value amount" id="showAmount">---</span>
                </div>
                <div class="invoice-row">
                    <span class="invoice-label">💳 شێوازی پارەدان</span>
                    <span class="invoice-value" id="showPayment">---</span>
                </div>

                <!-- واژووەکان -->
                <div class="signature-section">
                    <div class="signature-box">
                        <div class="label">✍️ واژووی پرۆگرامێر</div>
                        <div class="signature-line"></div>
                        <div class="signature-name" id="signatureProgrammer">---</div>
                    </div>
                    <div class="signature-box">
                        <div class="label">✍️ واژووی کڕیار</div>
                        <div class="signature-line"></div>
                        <div class="signature-name" id="signatureCustomer">---</div>
                    </div>
                </div>

                <div class="footer-thanks">
                    ❤️ سوپاس بۆ بازرگانییەکەت!
                </div>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <script>
        let invoiceData = {};
        let invoiceCounter = 0;

        function generateInvoice() {
            // وەرگرتنی زانیارییەکان
            const customer = document.getElementById('customerName').value.trim();
            const name = document.getElementById('programmerName').value.trim();
            const dateInput = document.getElementById('invoiceDate').value;
            const sponsor = document.getElementById('sponsorType').value.trim();
            const amount = document.getElementById('amount').value;
            const payment = document.getElementById('paymentMethod').value;

            // پشتڕاستکردنەوەی خانە پێویستەکان
            if (!customer || !name || !sponsor || !amount || parseFloat(amount) <= 0) {
                showToast('تکایە هەموو خانە پێویستەکان پڕ بکەوە!', 'error');
                return;
            }

            // ڕێکخستنی بەروار بۆ شێوەی خوازراو
            let formattedDate = '---';
            if (dateInput) {
                const d = new Date(dateInput + 'T00:00:00');
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                formattedDate = `${day}/${month}/${year}`;
            }

            // بڕی پارە بە دینار
            const amountNum = parseFloat(amount);
            const amountDisplay = `${amountNum.toFixed(3)} دینار`;

            // ژمارەی فاکتۆر
            invoiceCounter++;
            const invoiceNum = `INV-${String(invoiceCounter).padStart(4, '0')}-${new Date().getFullYear()}`;

            // هەڵگرتنی زانیارییەکان بۆ PDF
            invoiceData = {
                customer,
                name,
                formattedDate,
                sponsor,
                amountDisplay,
                payment,
                invoiceNum
            };

            // نیشاندانی لە فاکتۆردا
            document.getElementById('showCustomer').textContent = customer;
            document.getElementById('showName').textContent = name;
            document.getElementById('showDate').textContent = formattedDate;
            document.getElementById('showSponsor').textContent = sponsor;
            document.getElementById('showAmount').textContent = amountDisplay;
            document.getElementById('showPayment').textContent = payment;
            document.getElementById('invoiceNumber').textContent = `ژمارە: ${invoiceNum}`;

            // نیشاندانی ناوەکان لە ژێر واژوودا
            document.getElementById('signatureProgrammer').textContent = name;
            document.getElementById('signatureCustomer').textContent = customer;

            // پیشاندانی فاکتۆر و چالاککردنی دوگمەی PDF
            const wrapper = document.getElementById('invoiceWrapper');
            wrapper.classList.add('show');
            document.getElementById('pdfBtn').disabled = false;

            showToast('فاکتۆر بە سەرکەوتوویی دروست کرا! ✅', 'success');
        }

        function downloadPDF() {
            if (!invoiceData.customer) {
                showToast('تکایە یەکەم جار فاکتۆرەکە دروست بکە!', 'error');
                return;
            }

            const element = document.getElementById('invoiceContent');
            const opt = {
                margin: [10, 10, 10, 10],
                filename: `فاکتوری_سپۆنسەر_${invoiceData.customer}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // نیشاندانی بارکردن
            const btn = document.getElementById('pdfBtn');
            const originalText = btn.textContent;
            btn.textContent = '⏳ ئامادەدەکرێت...';
            btn.disabled = true;

            html2pdf().set(opt).from(element).save().then(function() {
                btn.textContent = originalText;
                btn.disabled = false;
                showToast('PDF بە سەرکەوتوویی داگیرا! 📥', 'success');
            }).catch(function(err) {
                console.error('PDF هەڵە:', err);
                btn.textContent = '❌ هەڵە';
                showToast('هەڵە لە دروستکردنی PDF', 'error');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);
            });
        }

        function clearAll() {
            // پاککردنەوەی خانەکانی فۆرم
            document.getElementById('customerName').value = '';
            document.getElementById('programmerName').value = '';
            document.getElementById('sponsorType').value = '';
            document.getElementById('amount').value = '';

            // گێڕانەوەی بەروار بۆ ئەمڕۆ
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('invoiceDate').value = today;

            // دیفۆڵتی شێوازی پارەدان
            document.getElementById('paymentMethod').value = 'نەقدی';

            // شاردنەوەی فاکتۆر
            document.getElementById('invoiceWrapper').classList.remove('show');
            document.getElementById('pdfBtn').disabled = true;

            // پاککردنەوەی داتاکان
            invoiceData = {};

            showToast('هەموو شتێک پاککرایەوە 🗑️', 'success');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;

            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        // بەرواری ئەمڕۆ بە دیفۆڵت دابنێ
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('invoiceDate').value = today;
        });
    </script>

</body>
</html>
