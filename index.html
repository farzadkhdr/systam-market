<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>سیستەمی مارکێت | Market ERP</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* هەموو ستایلەکان وەک خۆی ماون - هیچ گۆڕانکارییەکی ستایل نەکراوە */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Arial', sans-serif; }
    :root {
      --bg-start: #e9eefa;
      --bg-end: #f8f9fe;
      --card-bg: rgba(255,255,255,0.75);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --shadow: 0 30px 55px rgba(0,20,40,0.2);
      --border: 1px solid rgba(255,255,255,0.5);
      --module-bg: linear-gradient(135deg,rgba(255,255,255,0.9) 0%,rgba(255,255,255,0.7) 100%);
      --stat-bg: rgba(255,255,255,0.7);
      --icon-bg-fallback: #f1f5f9;
    }
    body {
      background: linear-gradient(145deg, var(--bg-end) 0%, var(--bg-start) 100%);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 2rem 1rem; transition: background 0.3s;
    }
    .system-container {
      width: 1400px; max-width: 100%;
      background: var(--card-bg); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-radius: 3.5rem; box-shadow: var(--shadow), inset 0 1px 1px rgba(255,255,255,0.7);
      padding: 1.8rem 2rem 2.2rem; border: var(--border);
      transition: background 0.3s, box-shadow 0.3s, opacity 0.5s;
    }
    .system
