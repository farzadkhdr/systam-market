<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
  <title>سیستەمی فرۆشتن و کڕین | پانێڵی بەڕێوەبەر</title>
  <style>
    /* ========== ڕێکخستنی گشتی ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: linear-gradient(145deg, #1a1e2b 0%, #2a2f3f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(255, 180, 120, 0.12) 0%, transparent 45%),
                  radial-gradient(circle at 70% 70%, rgba(100, 180, 255, 0.15) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .main-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 950px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 3.5rem;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 30px 55px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: all 0.3s ease;
    }

    h1 {
      text-align: center;
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 2.5rem;
      color: #f7e3c0;
      text-shadow: 0 4px 12px rgba(0,0,0,0.5);
      letter-spacing: 2px;
      background: linear-gradient(135deg, #ffd6a5, #ffb7b2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleGlow 2.5s infinite alternate;
    }

    @keyframes titleGlow {
      0% { filter: drop-shadow(0 0 6px #ff8c6b); }
      100% { filter: drop-shadow(0 0 18px #fca17d); }
    }

    /* ========== داشبۆردی سەرەکی ========== */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1.3rem;
      justify-content: center;
      align-items: start;
    }

    .card {
      background: rgba(20, 25, 35, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2.2rem;
      padding: 1.6rem 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #e0e0e0;
      font-weight: 600;
      font-size: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4);
      transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      min-height: 110px;
      word-break: break-word;
    }

    .card::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.25), transparent 50%);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    .card:hover::before {
      opacity: 0.3;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.03);
      border-color: rgba(255, 215, 150, 0.8);
      box-shadow: 0 25px 35px rgba(0, 0, 0, 0.7), 0 0 25px rgba(252, 176, 69, 0.5);
      color: #fff;
    }

    .card-icon {
      font-size: 2.3rem;
      margin-bottom: 0.7rem;
      filter: drop-shadow(0 6px 8px black);
      animation: floatIcon 3s infinite alternate ease-in-out;
    }

    @keyframes floatIcon {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-5px); }
    }

    /* ڕەنگەکانی کارتەکان */
    .card-sales { background: linear-gradient(135deg, #f2709c, #ff9472); }
    .card-purchase { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .card-return-purchase { background: linear-gradient(135deg, #43e97b, #38f9d7); }
    .card-return-sales { background: linear-gradient(135deg, #fa709a, #fee140); }
    .card-expense { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
    .card-receive { background: linear-gradient(135deg, #fccb90, #d57eeb); }
    .card-partners { background: linear-gradient(135deg, #667eea, #764ba2); }
    .card-persons { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .card-warehouse { background: linear-gradient(135deg, #4d7c8a, #7ec8e3); }
    .card-damaged { background: linear-gradient(135deg, #b2242c, #f35b4e); }
    .card-employees { background: linear-gradient(135deg, #2b8a5c, #6be89d); }
    .card-visas { background: linear-gradient(135deg, #cc8d3c, #e6b450); }
    .card-inventory { background: linear-gradient(135deg, #5f6a7a, #9ba7b5); }
    .card-settings { background: linear-gradient(135deg, #485563, #29323c); }
    .card-dashboard { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
    .card-reports { background: linear-gradient(135deg, #134e5e, #71b280); }

    .card span {
      background: rgba(0,0,0,0.4);
      padding: 0.2rem 0.9rem;
      border-radius: 30px;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      backdrop-filter: blur(4px);
    }

    /* ئەنیمەیشنی کارتەکان */
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .card { animation: fadeInUp 0.7s ease backwards; }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.2s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.3s; }
    .card:nth-child(7) { animation-delay: 0.35s; }
    .card:nth-child(8) { animation-delay: 0.4s; }
    .card:nth-child(9) { animation-delay: 0.45s; }
    .card:nth-child(10) { animation-delay: 0.5s; }
    .card:nth-child(11) { animation-delay: 0.55s; }
    .card:nth-child(12) { animation-delay: 0.6s; }
    .card:nth-child(13) { animation-delay: 0.65s; }
    .card:nth-child(14) { animation-delay: 0.7s; }
    .card:nth-child(15) { animation-delay: 0.75s; }
    .card:nth-child(16) { animation-delay: 0.8s; }

    /* ========== پانێڵی فرۆشتن ========== */
    .sales-panel {
      background: rgba(20, 25, 35, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 2.5rem;
      padding: 1.8rem;
      color: #eee;
      border: 1px solid rgba(255,255,255,0.25);
      margin-top: 1rem;
    }

    .sale-type-selector {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      background: rgba(0,0,0,0.3);
      padding: 0.5rem;
      border-radius: 3rem;
    }

    .sale-type-btn {
      flex: 1;
      padding: 0.8rem;
      border: none;
      border-radius: 2.5rem;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(255,255,255,0.1);
      color: #ccc;
    }

    .sale-type-btn.active {
      background: #4facfe;
      color: #000;
      box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
    }

    .sale-type-btn.credit-active {
      background: #f2709c;
      box-shadow: 0 0 20px rgba(242, 112, 156, 0.5);
    }

    .search-area {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.8rem;
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
      background: rgba(0,0,0,0.4);
      border-radius: 3rem;
      padding: 0.2rem;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.8rem 1.2rem;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    .search-box input::placeholder {
      color: #aaa;
    }

    .barcode-btn {
      background: #ff9472;
      border: none;
      border-radius: 2rem;
      padding: 0 1.3rem;
      font-weight: bold;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .suggestions {
      background: rgba(0,0,0,0.7);
      border-radius: 1.5rem;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 0.3rem;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .suggestion-item:hover {
      background: #f2709c;
    }

    .cart-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2rem 0;
      background: rgba(0,0,0,0.5);
      border-radius: 1rem;
      overflow: hidden;
    }

    .cart-table th, .cart-table td {
      padding: 0.6rem;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .cart-table input {
      width: 70px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 0.3rem;
      border-radius: 8px;
      text-align: center;
    }

    .qty-control {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .qty-btn {
      background: #f2709c;
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .invoice-section {
      margin-top: 2rem;
      border-top: 2px solid #ff9472;
      padding-top: 1.5rem;
    }

    .history-search {
      margin-bottom: 1rem;
    }

    .history-search input {
      width: 100%;
      padding: 0.7rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.4);
      color: white;
    }

    .history-list {
      max-height: 250px;
      overflow-y: auto;
      background: rgba(0,0,0,0.4);
      border-radius: 1rem;
      padding: 0.8rem;
      font-size: 0.85rem;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.2);
      border-radius: 0.8rem;
      margin-bottom: 0.4rem;
    }

    .history-item .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      font-weight: bold;
    }

    .badge-cash {
      background: #4facfe;
      color: #000;
    }

    .badge-credit {
      background: #f2709c;
      color: #fff;
    }

    .action-buttons {
      display: flex;
      gap: 0.4rem;
    }

    button {
      background: #f2709c;
      border: none;
      color: white;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #ff9472;
    }

    .back-btn {
      background: #485563;
      margin-bottom: 1rem;
    }

    .invoice-preview {
      background: white;
      color: #000;
      border-radius: 1.5rem;
      padding: 2rem;
      margin-top: 1.5rem;
      font-family: 'Segoe UI', sans-serif;
      position: relative;
    }

    .invoice-preview .invoice-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #eee;
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }

    .invoice-preview .logo-placeholder {
      width: 80px;
      height: 80px;
      background: #f0f0f0;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .invoice-preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }

    .invoice-preview th {
      background: #f5f5f5;
      padding: 0.6rem;
      border-bottom: 2px solid #ddd;
    }

    .invoice-preview td {
      padding: 0.5rem;
      border-bottom: 1px solid #eee;
    }

    .invoice-preview .total-row {
      font-weight: bold;
      font-size: 1.2rem;
    }

    .print-btn-area {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .print-btn {
      background: #43e97b;
      color: #000;
      padding: 0.8rem 2rem;
      font-size: 1.1rem;
    }

    .credit-info {
      background: rgba(242, 112, 156, 0.2);
      border: 1px solid #f2709c;
      border-radius: 1rem;
      padding: 1rem;
      margin: 1rem 0;
    }

    .credit-info input {
      width: 100%;
      padding: 0.6rem;
      border-radius: 1rem;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.4);
      color: white;
      margin-top: 0.5rem;
    }

    /* ========== پانێڵی داشبۆردی ئاماری ========== */
    .dashboard-panel {
      background: rgba(20, 25, 35, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 2.5rem;
      padding: 1.8rem;
      color: #eee;
      border: 1px solid rgba(255,255,255,0.25);
      margin-top: 1rem;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: rgba(0,0,0,0.4);
      border-radius: 1.5rem;
      padding: 1.2rem;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .stat-card .stat-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .stat-card .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffb7b2;
      margin: 0.3rem 0;
    }

    .stat-card .stat-label {
      font-size: 0.85rem;
      color: #aaa;
    }

    .difference-highlight {
      background: rgba(255,255,255,0.1);
      border: 1px solid #ff9472;
      border-radius: 2rem;
      padding: 1.5rem;
      margin-top: 1.5rem;
      text-align: center;
    }

    .diff-value {
      font-size: 2.2rem;
      font-weight: 800;
      color: #ffd6a5;
      text-shadow: 0 0 15px #ff9472;
    }

    @media (max-width: 500px) {
      .main-container { padding: 1.5rem 1rem; }
      .dashboard-grid { grid-template-columns: repeat(2, 1fr); gap: 0.9rem; }
      .card { padding: 1.2rem 0.4rem; min-height: 90px; }
      .stat-grid { grid-template-columns: 1fr; }
    }

    @media print {
      body { background: white; }
      .main-container { background: white; box-shadow: none; border: none; }
      .back-btn, .search-area, .barcode-btn, .action-buttons, .history-section,
      .sale-type-selector, .credit-info, .print-btn-area, .history-search { display: none !important; }
      .invoice-preview { box-shadow: none; border: none; padding: 0; }
    }
  </style>
</head>
<body>
  <div class="main-container" id="appRoot"></div>

  <script>
    (function() {
      // ==================== داتابەیسی نموونەیی ====================
      const productsDB = [
        { id: 1, name: "مۆبایل سامسونگ", price: 350000, unit: "دانە", image: "📱", barcode: "123456" },
        { id: 2, name: "لەپتۆپ ئەیسر", price: 750000, unit: "دانە", image: "💻", barcode: "789012" },
        { id: 3, name: "مۆبایل ئایفۆن", price: 950000, unit: "دانە", image: "📲", barcode: "345678" },
        { id: 4, name: "شاشە ٢٤ ئینج", price: 180000, unit: "دانە", image: "🖥️", barcode: "901234" },
        { id: 5, name: "کۆمپیوتەر ئەسەمبڵ", price: 520000, unit: "دانە", image: "🖥️", barcode: "567890" },
        { id: 6, name: "مۆبایل شیاومی", price: 280000, unit: "دانە", image: "📱", barcode: "112233" }
      ];

      const personsDB = [
        { id: 1, name: "ئارام محەمەد", phone: "0750-111-2233", debt: 150000 },
        { id: 2, name: "سارا ئەحمەد", phone: "0750-222-3344", debt: 0 },
        { id: 3, name: "هێمن عەلی", phone: "0750-333-4455", debt: 450000 },
        { id: 4, name: "شیلان عومەر", phone: "0750-444-5566", debt: 80000 }
      ];

      // مێژووی کڕین (نموونەیی)
      const purchaseHistory = [
        { date: '2026-05-04', total: 250000, description: 'کڕینی مۆبایل' },
        { date: '2026-05-03', total: 150000, description: 'کڕینی ئیکسسوارات' },
        { date: '2026-05-04', total: 400000, description: 'کڕینی لەپتۆپ' }
      ];

      // مێژووی سەرف کردن (نموونەیی)
      const expenseHistory = [
        { date: '2026-05-04', total: 50000, description: 'کرێی کارەبا' },
        { date: '2026-05-03', total: 25000, description: 'پاککەرەوە' },
        { date: '2026-05-02', total: 100000, description: 'کرێی شوێن' }
      ];

      // مێژووی واسڵ کردن (نموونەیی)
      const receiveHistory = [
        { date: '2026-05-04', total: 300000, description: 'واسڵکردنی قەرز' },
        { date: '2026-05-03', total: 150000, description: 'واسڵکردنی فرۆشتن' }
      ];

      let salesHistory = JSON.parse(localStorage.getItem('salesHistory')) || [];
      let invoiceCounter = JSON.parse(localStorage.getItem('invoiceCounter')) || 1000;

      // ==================== گۆڕاوە گشتییەکانی ڕووکار ====================
      let cart = [];
      let currentView = 'dashboard';
      let saleType = 'cash';
      let selectedPerson = null;
      let invoicePreviewData = null;

      const root = document.getElementById('appRoot');

      // ==================== فەنکشنی یارمەتیدەر ====================
      function getTodayDateString() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }

      function saveHistory() {
        localStorage.setItem('salesHistory', JSON.stringify(salesHistory));
        localStorage.setItem('invoiceCounter', JSON.stringify(invoiceCounter));
      }

      function generateInvoiceNumber() {
        invoiceCounter++;
        saveHistory();
        return `INV-${invoiceCounter}`;
      }

      // ==================== هەژمارکردنی ئامارەکانی داشبۆرد ====================
      function getDashboardStats() {
        const today = getTodayDateString();
        
        const todaySales = salesHistory.filter(s => s.date === today).reduce((sum, s) => sum + s.total, 0);
        const todayPurchases = purchaseHistory.filter(p => p.date === today).reduce((sum, p) => sum + p.total, 0);
        const totalSales = salesHistory.reduce((sum, s) => sum + s.total, 0);
        const totalExpenses = expenseHistory.reduce((sum, e) => sum + e.total, 0);
        const totalPurchases = purchaseHistory.reduce((sum, p) => sum + p.total, 0);
        const totalReceives = receiveHistory.reduce((sum, r) => sum + r.total, 0);
        const todayReceives = receiveHistory.filter(r => r.date === today).reduce((sum, r) => sum + r.total, 0);
        const totalProducts = productsDB.length;
        const totalPersons = personsDB.length;
        const totalPartners = 3; // داتای نموونەیی
        const difference = totalReceives - totalExpenses + totalPurchases;
        
        return {
          todaySales,
          todayPurchases,
          totalSales,
          totalExpenses,
          totalPurchases,
          totalReceives,
          todayReceives,
          totalProducts,
          totalPersons,
          totalPartners,
          difference
        };
      }

      // ==================== ڕێندەرکردنی ڕووکارەکان ====================
      function renderDashboard() {
        const html = `
          <h1>⚡ سیستەمی بەڕێوەبردن ⚡</h1>
          <div class="dashboard-grid">
            <div class="card card-sales" data-view="sales">
              <div class="card-icon">🛒</div><span>فرۆشتن</span>
            </div>
            <div class="card card-purchase"><div class="card-icon">📦</div><span>کڕین</span></div>
            <div class="card card-return-purchase"><div class="card-icon">↩️</div><span>گەڕانەوەی کڕین</span></div>
            <div class="card card-return-sales"><div class="card-icon">🔙</div><span>گەڕانەوەی فرۆشتن</span></div>

      // ==================== فەنکشنەکانی فاکتوورە ====================
      function buildInvoiceData(receiptAmount = 0) {
        const now = new Date();
        const total = cart.reduce((sum, i) => sum + (i.quantity * i.price), 0);
        const oldDebt = selectedPerson ? selectedPerson.debt : 0;
        const newDebt = oldDebt + total - receiptAmount;
        
        return {
          invoiceNumber: generateInvoiceNumber(),
          date: now.toLocaleDateString('ckb', { year:'numeric', month:'long', day:'numeric' }),
          time: now.toLocaleTimeString('ckb', { hour:'2-digit', minute:'2-digit' }),
          saleType: saleType,
          person: selectedPerson ? { ...selectedPerson } : null,
          items: cart.map(i => ({ 
            name: i.product.name, 
            qty: i.quantity, 
            price: i.price, 
            unit: i.unit, 
            image: i.product.image 
          })),
          total: total,
          receiptAmount: receiptAmount,
          oldDebt: oldDebt,
          newDebt: newDebt
        };
      }

      function previewInvoice() {
        if (cart.length === 0) {
          alert('سەبەتە بەتاڵە!');
          return;
        }
        if (saleType === 'credit' && !selectedPerson) {
          alert('تکایە کڕیار هەڵبژێرە بۆ فرۆشتنی قەرز!');
          return;
        }
        const receiptAmount = saleType === 'credit' ? 
          (parseFloat(document.getElementById('receiptAmountInput')?.value) || 0) : 0;
        invoicePreviewData = buildInvoiceData(receiptAmount);
        renderSalesPanel();
      }

      function completeSale() {
        if (cart.length === 0) {
          alert('سەبەتە بەتاڵە!');
          return;
        }
        if (saleType === 'credit' && !selectedPerson) {
          alert('تکایە کڕیار هەڵبژێرە بۆ فرۆشتنی قەرز!');
          return;
        }
        
        const receiptAmount = saleType === 'credit' ? 
          (parseFloat(document.getElementById('receiptAmountInput')?.value) || 0) : 0;
        
        const invoice = buildInvoiceData(receiptAmount);
        
        salesHistory.unshift(invoice);
        saveHistory();
        
        if (saleType === 'credit' && selectedPerson) {
          const personIndex = personsDB.findIndex(p => p.id === selectedPerson.id);
          if (personIndex !== -1) {
            personsDB[personIndex].debt = invoice.newDebt;
            selectedPerson.debt = invoice.newDebt;
          }
        }
        
        cart = [];
        invoicePreviewData = null;
        
        let message = `✅ فرۆشتن تەواو بوو!\nکۆدی فاکتوورە: ${invoice.invoiceNumber}\nکۆی گشتی: ${invoice.total.toLocaleString()} د`;
        if (saleType === 'credit') {
          message += `\n\n📊 کورتە:\nقەرزی پێشوو: ${invoice.oldDebt.toLocaleString()} د\nواسڵکراو: ${invoice.receiptAmount.toLocaleString()} د\nقەرزی نوێ: ${invoice.newDebt.toLocaleString()} د`;
        }
        alert(message);
        
        selectedPerson = null;
        saleType = 'cash';
        renderSalesPanel();
      }

      // ==================== فەنکشنەکانی سەبەتە ====================
      function handleSearch() {
        const input = document.getElementById('searchInput');
        const container = document.getElementById('suggestionsContainer');
        const query = input.value.trim().toLowerCase();
        if (!query) {
          container.style.display = 'none';
          return;
        }
        const filtered = productsDB.filter(p => p.name.toLowerCase().includes(query));
        if (filtered.length === 0) {
          container.style.display = 'none';
          return;
        }
        container.innerHTML = filtered.map(p => `
          <div class="suggestion-item" data-id="${p.id}">
            <span>${p.image}</span><span>${p.name}</span><span style="margin-right:auto;">${p.price.toLocaleString()} د</span>
          </div>
        `).join('');
        container.style.display = 'block';
        
        container.querySelectorAll('.suggestion-item').forEach(item => {
          item.addEventListener('click', () => {
            const id = parseInt(item.dataset.id);
            addProductById(id);
            container.style.display = 'none';
            document.getElementById('searchInput').value = '';
          });
        });
      }

      function addProductById(id) {
        const product = productsDB.find(p => p.id === id);
        if (!product) return;
        const existing = cart.find(item => item.product.id === id);
        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({ product: {...product}, quantity: 1, price: product.price, unit: product.unit });
        }
        invoicePreviewData = null;
        renderSalesPanel();
      }

      function addProductByBarcode(code) {
        const product = productsDB.find(p => p.barcode === code);
        if (!product) {
          alert('کاڵا نەدۆزرایەوە بەم بارکۆدە!');
          return;
        }
        addProductById(product.id);
      }

      function updateCartItem(productId, field, value) {
        const item = cart.find(i => i.product.id === productId);
        if (!item) return;
        if (field === 'quantity') {
          item.quantity = Math.max(1, parseInt(value) || 1);
        } else if (field === 'price') {
          item.price = Math.max(0, parseFloat(value) || 0);
        } else if (field === 'unit') {
          item.unit = value;
        }
        invoicePreviewData = null;
        renderSalesPanel();
      }

      function adjustQty(productId, delta) {
        const item = cart.find(i => i.product.id === productId);
        if (!item) return;
        item.quantity = Math.max(1, item.quantity + delta);
        invoicePreviewData = null;
        renderSalesPanel();
      }

      function removeCartItem(productId) {
        cart = cart.filter(i => i.product.id !== productId);
        invoicePreviewData = null;
        renderSalesPanel();
      }

      function renderCart() {
        const tbody = document.querySelector('#cartTable tbody');
        const totalSpan = document.getElementById('totalAmount');
        if (!tbody) return;
        
        let total = 0;
        tbody.innerHTML = cart.map(item => {
          const lineTotal = item.quantity * item.price;
          total += lineTotal;
          return `
            <tr>
              <td>${item.product.image} ${item.product.name}</td>
              <td><input type="text" value="${item.unit}" onchange="window.cartUpdate(${item.product.id}, 'unit', this.value)"></td>
              <td><input type="number" value="${item.price}" onchange="window.cartUpdate(${item.product.id}, 'price', this.value)"></td>
              <td>
                <div class="qty-control">
                  <button class="qty-btn" onclick="window.qtyDown(${item.product.id})">−</button>
                  <input type="number" value="${item.quantity}" min="1" style="width:50px;" onchange="window.cartUpdate(${item.product.id}, 'quantity', this.value)">
                  <button class="qty-btn" onclick="window.qtyUp(${item.product.id})">+</button>
                </div>
               </td>
              <td>${lineTotal.toLocaleString()}</td>
              <td><button onclick="window.removeFromCart(${item.product.id})">❌</button></td>
            </tr>
          `;
        }).join('');
        if (totalSpan) totalSpan.textContent = total.toLocaleString();
        
        window.cartUpdate = (id, field, val) => updateCartItem(id, field, val);
        window.qtyUp = (id) => adjustQty(id, 1);
        window.qtyDown = (id) => adjustQty(id, -1);
        window.removeFromCart = (id) => removeCartItem(id);
      }

      // ==================== فەنکشنەکانی مێژوو ====================
      function renderHistory() {
        const container = document.getElementById('historyContainer');
        if (!container) return;
        
        const searchQuery = document.getElementById('historySearchInput')?.value?.trim()?.toLowerCase() || '';
        
        let filtered = salesHistory;
        if (searchQuery) {
          filtered = salesHistory.filter(inv => 
            inv.invoiceNumber.toLowerCase().includes(searchQuery) ||
            (inv.person && inv.person.name.toLowerCase().includes(searchQuery))
          );
        }
        
        if (filtered.length === 0) {
          container.innerHTML = '<p style="padding:1rem;">هیچ مێژوویەک نەدۆزرایەوە.</p>';
          return;
        }
        
        container.innerHTML = filtered.map(inv => `
          <div class="history-item">
            <div>
              <strong>${inv.invoiceNumber}</strong>
              <span class="badge ${inv.saleType === 'cash' ? 'badge-cash' : 'badge-credit'}">${inv.saleType === 'cash' ? 'نەقدی' : 'قەرز'}</span>
              <br>📅 ${inv.date} - ${inv.time}
              ${inv.person ? `<br>👤 ${inv.person.name}` : ''}
              <br>کۆ: <strong>${inv.total.toLocaleString()}</strong> د
              ${inv.saleType === 'credit' ? `<br>💰 واسڵکراو: ${(inv.receiptAmount||0).toLocaleString()} د<br><span style="color:#f2709c;">📋 قەرزی ماوە: ${(inv.newDebt||0).toLocaleString()} د</span>` : ''}
              <br><small>${inv.items.map(i => i.name + ' x' + i.qty).join('، ')}</small>
            </div>
            <div class="action-buttons">
              <button onclick="window.viewInvoice('${inv.invoiceNumber}')">👁️</button>
              <button onclick="window.printExistingInvoice('${inv.invoiceNumber}')">🖨️</button>
              <button onclick="window.editHistory('${inv.invoiceNumber}')">✏️</button>
              <button onclick="window.deleteHistory('${inv.invoiceNumber}')">🗑️</button>
            </div>
          </div>
        `).join('');
        
        window.deleteHistory = (invoiceNumber) => {
          if (confirm('دڵنیایت دەتەوێت ئەم فاکتوورەیە بسڕیتەوە؟')) {
            salesHistory = salesHistory.filter(inv => inv.invoiceNumber !== invoiceNumber);
            saveHistory();
            renderSalesPanel();
          }
        };
        
        window.viewInvoice = (invoiceNumber) => {
          const inv = salesHistory.find(i => i.invoiceNumber === invoiceNumber);
          if (inv) {
            invoicePreviewData = inv;
            renderSalesPanel();
          }
        };
        
        window.printExistingInvoice = function(invoiceNumber) {
          const inv = salesHistory.find(i => i.invoiceNumber === invoiceNumber);
          if (!inv) return;
          
          const printWindow = window.open('', '_blank');
          printWindow.document.write(`
            <!DOCTYPE html>
            <html dir="rtl">
            <head>
              <title>فاکتوور - ${inv.invoiceNumber}</title>
              <meta charset="UTF-8">
              <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { font-family: 'Segoe UI', Arial, sans-serif; padding: 2rem; background: white; color: black; }
                .invoice-print { max-width: 800px; margin: 0 auto; direction: rtl; }
                .invoice-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 1rem; margin-bottom: 1rem; }
                .logo-placeholder { width: 80px; height: 80px; background: #f0f0f0; border-radius: 1rem; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
                table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
                th { background: #f5f5f5; padding: 0.6rem; border-bottom: 2px solid #ddd; text-align: right; }
                td { padding: 0.5rem; border-bottom: 1px solid #eee; text-align: right; }
                .total-row { font-weight: bold; font-size: 1.2rem; }
                .footer { text-align: center; margin-top: 2rem; color: #888; font-size: 0.8rem; }
              </style>
            </head>
            <body>
              <div class="invoice-print">
                ${generateInvoiceHTML(inv)}
              </div>
              <script>window.onload = function() { window.print(); setTimeout(function() { window.close(); }, 500); }<\/script>
            </body>
            </html>
          `);
          printWindow.document.close();
        };
        
        window.editHistory = (invoiceNumber) => {
          const inv = salesHistory.find(i => i.invoiceNumber === invoiceNumber);
          if (!inv) return;
          cart = inv.items.map(item => {
            const prod = productsDB.find(p => p.name === item.name) || { id: Date.now(), name: item.name, price: item.price, unit: item.unit, image: '📦', barcode: '' };
            return { product: prod, quantity: item.qty, price: item.price, unit: item.unit };
          });
          saleType = inv.saleType;
          selectedPerson = inv.person || null;
          salesHistory = salesHistory.filter(i => i.invoiceNumber !== invoiceNumber);
          invoicePreviewData = null;
          saveHistory();
          renderSalesPanel();
          alert('ئایتمەکان خرانە ناو سەبەتەوە بۆ دەستکاری. دوای کلیکی "فرۆشتن" فاکتوورەی نوێ دروست دەبێت.');
        };
      }

      function generateInvoiceHTML(inv) {
        return `
          <div class="invoice-header">
            <div class="logo-placeholder">🏢</div>
            <div><h3>سیستەمی فرۆشتن</h3>
            <p>کۆدی فاکتوورە: <strong>${inv.invoiceNumber}</strong></p>
            <p>بەروار: ${inv.date} - ${inv.time}</p></div>
          </div>
          <div><p><strong>جۆری فرۆشتن:</strong> ${inv.saleType === 'cash' ? 'نەقدی' : 'قەرز'}</p>
          ${inv.person ? `<p><strong>کڕیار:</strong> ${inv.person.name} | 📞 ${inv.person.phone}</p>` : ''}</div>
          <table>
            <thead><tr><th>#</th><th>کاڵا</th><th>یەکە</th><th>نرخ</th><th>بڕ</th><th>کۆ</th></tr></thead>
            <tbody>${inv.items.map((item, i) => `<tr><td>${i+1}</td><td>${item.name}</td><td>${item.unit}</td><td>${item.price.toLocaleString()}</td><td>${item.qty}</td><td>${(item.qty * item.price).toLocaleString()}</td></tr>`).join('')}</tbody>
            <tfoot><tr class="total-row"><td colspan="5">کۆی گشتی</td><td>${inv.total.toLocaleString()} د</td></tr>
            ${inv.saleType === 'credit' ? `
            <tr><td colspan="5">قەرزی پێشوو</td><td>${(inv.oldDebt||0).toLocaleString()} د</td></tr>
            <tr><td colspan="5">واسڵکراو</td><td>${(inv.receiptAmount||0).toLocaleString()} د</td></tr>
            <tr style="color:#f2709c;"><td colspan="5">قەرزی نوێ</td><td>${(inv.newDebt||0).toLocaleString()} د</td></tr>
            ` : ''}
            </tfoot>
          </table>
          <div class="footer"><p>سوپاس بۆ مامەڵەکەت! 🛒</p></div>
        `;
      }

      // ==================== فەنکشنی چاپکردن ====================
      window.printInvoice = function() {
        const invoiceEl = document.getElementById('invoicePreview');
        if (!invoiceEl) {
          alert('هیچ فاکتوورێک بۆ چاپکردن نییە!');
          return;
        }
        
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
          <!DOCTYPE html>
          <html dir="rtl">
          <head>
            <title>فاکتووری فرۆشتن - ${invoicePreviewData?.invoiceNumber || ''}</title>
            <meta charset="UTF-8">
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: 'Segoe UI', Arial, sans-serif; padding: 2rem; background: white; color: black; }
              .invoice-print { max-width: 800px; margin: 0 auto; direction: rtl; }
              .invoice-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 1rem; margin-bottom: 1rem; }
              .logo-placeholder { width: 80px; height: 80px; background: #f0f0f0; border-radius: 1rem; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
              table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
              th { background: #f5f5f5; padding: 0.6rem; border-bottom: 2px solid #ddd; text-align: right; }
              td { padding: 0.5rem; border-bottom: 1px solid #eee; text-align: right; }
              .total-row { font-weight: bold; font-size: 1.2rem; }
              .footer { text-align: center; margin-top: 2rem; color: #888; font-size: 0.8rem; }
            </style>
          </head>
          <body>
            <div class="invoice-print">
              ${invoiceEl.cloneNode(true).innerHTML}
            </div>
            <script>
              window.onload = function() {
                window.print();
                setTimeout(function() { window.close(); }, 500);
              };
            <\/script>
          </body>
          </html>
        `);
        printWindow.document.close();
      };

      // ==================== دەستپێکردنی بەرنامە ====================
      renderDashboard();
    })();
  </script>
</body>
</html>
