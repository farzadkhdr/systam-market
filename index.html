<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاکتوری سپۆنسەر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #1a237e;
            font-size: 28px;
            margin-bottom: 25px;
            border-bottom: 3px solid #1a237e;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
            background: #fafafa;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1a237e;
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #0d1457;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 35, 126, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* ===== فاکتۆر ===== */
        .invoice {
            margin-top: 30px;
            background: #ffffff;
            border: 3px solid #1a237e;
            border-radius: 16px;
            padding: 25px 25px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: none;
        }

        .invoice.show {
            display: block;
            animation: fadeSlide 0.5s ease;
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .invoice-header {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            color: #1a237e;
            border-bottom: 3px double #1a237e;
            padding-bottom: 12px;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }

        .invoice-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #e0e0e0;
            font-size: 16px;
        }

        .invoice-row:last-of-type {
            border-bottom: none;
        }

        .invoice-label {
            font-weight: 700;
            color: #444;
        }

        .invoice-value {
            color: #1a237e;
            font-weight: 600;
            text-align: left;
        }

        .invoice-value.amount {
            font-size: 22px;
            color: #b71c1c;
            font-weight: 800;
        }

        .signature-section {
            margin-top: 25px;
            padding-top: 18px;
            border-top: 2px solid #1a237e;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .signature-box {
            flex: 1;
            text-align: center;
        }

        .signature-box .label {
            font-weight: 700;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .signature-line {
            border-bottom: 2px solid #333;
            height: 30px;
            margin-top: 6px;
        }

        .footer-thanks {
            text-align: center;
            font-size: 18px;
            color: #1a237e;
            margin-top: 20px;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            background: #1a237e;
            color: white;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 14px;
            margin-top: 6px;
        }

        @media (max-width: 480px) {
            .container { padding: 16px; }
            .invoice { padding: 18px; }
            .invoice-row { font-size: 14px; flex-wrap: wrap; }
            .signature-section { flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📄 فاکتوری سپۆنسەر</h1>

    <!-- فۆرم -->
    <div class="form-group">
        <label>👨‍💻 ناوی پرۆگرامێر</label>
        <input type="text" id="programmerName" placeholder="نمونە: ئەحمەد ڕەشید">
    </div>

    <div class="form-group">
        <label>📅 بەروار</label>
        <input type="date" id="invoiceDate">
    </div>

    <div class="form-group">
        <label>🏷️ جۆری سپۆنسەر</label>
        <input type="text" id="sponsorType" placeholder="نمونە: سپۆنسەری زێرین / پلاتین">
    </div>

    <div class="form-group">
        <label>💰 بڕی پارەی سپۆنسەر ($)</label>
        <input type="number" id="amount" placeholder="بڕی پارە بە دۆلار" step="0.01" min="0">
    </div>

    <div class="form-group">
        <label>💳 شێوازی پارەدان</label>
        <select id="paymentMethod">
            <option value="نەقدی">نەقدی</option>
            <option value="کارتی بانکی">کارتی بانکی</option>
            <option value="ڤاتەر">ڤاتەر</option>
            <option value="کریپتۆ">کریپتۆ</option>
        </select>
    </div>

    <button class="btn" onclick="generateInvoice()">🚀 دروستکردنی فاکتۆر</button>

    <!-- ===== فاکتۆر ===== -->
    <div class="invoice" id="invoiceDisplay">
        <div class="invoice-header">فاکتوری سپۆنسەر</div>

        <div class="invoice-row">
            <span class="invoice-label">ناوی پرۆگرامێر</span>
            <span class="invoice-value" id="showName">---</span>
        </div>
        <div class="invoice-row">
            <span class="invoice-label">بەروار</span>
            <span class="invoice-value" id="showDate">---</span>
        </div>
        <div class="invoice-row">
            <span class="invoice-label">جۆری سپۆنسەر</span>
            <span class="invoice-value" id="showSponsor">---</span>
        </div>
        <div class="invoice-row">
            <span class="invoice-label">بڕی پارە</span>
            <span class="invoice-value amount" id="showAmount">---</span>
        </div>
        <div class="invoice-row">
            <span class="invoice-label">شێوازی پارەدان</span>
            <span class="invoice-value" id="showPayment">---</span>
        </div>

        <!-- واژووەکان -->
        <div class="signature-section">
            <div class="signature-box">
                <div class="label">✍️ واژووی پرۆگرامێر</div>
                <div class="signature-line"></div>
            </div>
            <div class="signature-box">
                <div class="label">✍️ واژووی کڕیار</div>
                <div class="signature-line"></div>
            </div>
        </div>

        <div class="footer-thanks">
            ❤️ سوپاس بۆ بازرگانییەکەت!
        </div>
    </div>
</div>

<script>
    function generateInvoice() {
        // وەرگرتنی زانیارییەکان
        const name = document.getElementById('programmerName').value.trim() || '---';
        const dateInput = document.getElementById('invoiceDate').value;
        const sponsor = document.getElementById('sponsorType').value.trim() || '---';
        const amount = document.getElementById('amount').value;
        const payment = document.getElementById('paymentMethod').value;

        // ڕێکخستنی بەروار بۆ شێوەی خوازراو
        let formattedDate = '---';
        if (dateInput) {
            const d = new Date(dateInput + 'T00:00:00');
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            formattedDate = `${day}/${month}/${year}`;
        }

        // بڕی پارە
        let amountDisplay = '---';
        if (amount && !isNaN(amount) && parseFloat(amount) > 0) {
            amountDisplay = `${parseFloat(amount).toFixed(2)} $`;
        } else {
            amountDisplay = '0.00 $';
        }

        // نیشاندانی لە فاکتۆردا
        document.getElementById('showName').textContent = name;
        document.getElementById('showDate').textContent = formattedDate;
        document.getElementById('showSponsor').textContent = sponsor;
        document.getElementById('showAmount').textContent = amountDisplay;
        document.getElementById('showPayment').textContent = payment;

        // پیشاندانی فاکتۆر
        const invoiceEl = document.getElementById('invoiceDisplay');
        invoiceEl.classList.add('show');

        // ئەگەر بەروار بەتاڵ بوو، دەستکاری بکە
        if (dateInput === '') {
            document.getElementById('showDate').textContent = '---';
        }
    }

    // بەرواری ئەمڕۆ بە دیفۆڵت دابنێ (بۆ ئاسانی)
    document.addEventListener('DOMContentLoaded', function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('invoiceDate').value = today;
    });
</script>

</body>
</html>
